<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE BOOK - 知识图谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #141413;
            --bg-secondary: #1c1c1a;
            --bg-tertiary: #2a2a28;
            --bg-hover: #333331;
            --bg-input: #1a1a19;
            --text-primary: #f0eee6;
            --text-secondary: #c8c6bd;
            --text-tertiary: #8b8a82;
            --text-muted: #5c5b55;
            --border: #3d3d3a;
            --accent: #d97757;
            --accent-hover: #e08a6e;
            --accent-light: #e08a6e;
            --accent-glow: rgba(217, 119, 87, 0.3);
            --success: #5aab7a;
            --warning: #d4a853;
            --error: #e05555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Header */
        .header {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .nav {
            display: flex;
            gap: 6px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: var(--radius-md, 8px);
            font-size: 13px;
            transition: all 0.15s;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .nav-link.active {
            color: var(--accent);
            background: var(--bg-tertiary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--accent-light);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* Main Container */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filter-section {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .filter-item {
            padding: 8px 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: background 0.15s;
        }

        .filter-item:hover {
            background: var(--bg-hover);
        }

        .filter-item.active {
            background: var(--accent);
            color: white;
        }

        .filter-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .filter-item.active .filter-count {
            color: rgba(255,255,255,0.8);
        }

        .node-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .node-item {
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .node-item:hover {
            background: var(--bg-hover);
            transform: translateX(4px);
        }

        .node-item.selected {
            background: var(--accent);
            color: white;
        }

        .node-type {
            font-size: 18px;
            margin-right: 8px;
        }

        .node-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .node-meta {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .node-item.selected .node-meta {
            color: rgba(255,255,255,0.8);
        }

        /* Canvas */
        .canvas-container {
            flex: 1;
            position: relative;
            background: var(--bg-primary);
        }

        #graphCanvas {
            width: 100%;
            height: 100%;
        }

        /* Canvas Controls */
        .canvas-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.15s;
        }

        .control-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        /* Detail Panel */
        .detail-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .detail-panel.show {
            transform: translateX(0);
        }

        .detail-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-title {
            font-size: 18px;
            font-weight: 600;
        }

        .detail-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .detail-close:hover {
            background: var(--bg-hover);
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .detail-field {
            margin-bottom: 12px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 12px;
        }

        .connection-item {
            padding: 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .connection-item:hover {
            background: var(--bg-hover);
        }

        .connection-type {
            font-size: 11px;
            color: var(--accent-light);
            margin-bottom: 4px;
        }

        .connection-name {
            font-size: 13px;
        }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
        }

        .legend-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* Stats Bar */
        .stats-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-light);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            max-width: min(500px, 92vw);
            width: 90%;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0 10px;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .menu-bar {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .menu-item {
                padding: 0 10px;
            }
            
            .main-content,
            .content-area {
                padding: 10px;
            }
            
            .sidebar {
                position: fixed;
                left: -280px;
                width: 280px;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
            }
            
            .sidebar.mobile-open {
                left: 0;
            }
            
            .mobile-menu-btn {
                display: block !important;
            }
            
            .btn-group {
                flex-wrap: wrap;
            }
            
            .modal-content {
                width: 95%;
                padding: 15px;
            }
            
            .editor-pane {
                font-size: 16px;
            }
            
            .stats-bar {
                flex-wrap: wrap;
                gap: 5px;
            }
            
            .ai-panel {
                width: 100%;
                position: fixed;
                bottom: 0;
                right: 0;
                height: 50%;
            }
        }
        
        @media (max-width: 480px) {
            .toolbar-title {
                font-size: 12px;
            }
            
            .menu-bar {
                height: auto;
                flex-wrap: wrap;
            }
            
            .dropdown-menu {
                position: fixed;
                width: 100%;
                left: 0 !important;
            }
            
            .settings-group {
                padding: 15px;
            }
            
            .setting-item {
                padding: 10px;
            }
        }
        
        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .mobile-menu-btn:active {
            background: var(--accent);
        }
        /* 同步提示 */
        .kg-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); border: 1px solid var(--accent); color: var(--text-primary);
            padding: 12px 22px; border-radius: 12px; font-size: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s;
            z-index: 400; pointer-events: none;
        }
        .kg-toast.show { opacity: 1; }
    </style>

<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wdth,wght,slnt@8..144,25..151,100..1000,-10..0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="text-pressure.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a class="logo-link" href="index.html"><div class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text brand-text" data-text="SAGEBOOK">SAGEBOOK</span>
            <span style="color: var(--text-secondary); margin-left: 20px;">知识图谱</span>
        </div></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">🏠 首页</a>
            <a href="main-editor.html" class="nav-link">编辑器</a>
            <a href="character-management.html" class="nav-link">角色</a>
            <a href="template-gallery.html" class="nav-link">模板</a>
            <a href="outline-editor.html" class="nav-link">大纲</a>
            <a href="knowledge-graph.html" class="nav-link active">图谱</a>
            <a href="settings.html" class="nav-link">设置</a>
        </nav>
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="菜单">☰</button>
        <div class="header-actions">
            <button class="btn-secondary btn" onclick="resetView()">重置视图</button>
            <button class="btn-secondary btn" onclick="exportGraph()">导出图谱</button>
            <button class="btn" onclick="syncFromSources()">🔄 同步内容</button>
            <button class="btn" onclick="showAddNodeModal()">+ 添加节点</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <input type="text" class="search-input" placeholder="🔍 搜索节点..." id="searchInput" oninput="searchNodes(this.value)">
            </div>

            <div class="filter-section">
                <div class="filter-title">节点类型</div>
                <div class="filter-item active" data-type="all" onclick="filterNodes('all')">
                    <span>全部</span>
                    <span class="filter-count" id="countAll">0</span>
                </div>
                <div class="filter-item" data-type="character" onclick="filterNodes('character')">
                    <span>👤 角色</span>
                    <span class="filter-count" id="countCharacter">0</span>
                </div>
                <div class="filter-item" data-type="location" onclick="filterNodes('location')">
                    <span>📍 地点</span>
                    <span class="filter-count" id="countLocation">0</span>
                </div>
                <div class="filter-item" data-type="event" onclick="filterNodes('event')">
                    <span>⚡ 事件</span>
                    <span class="filter-count" id="countEvent">0</span>
                </div>
                <div class="filter-item" data-type="item" onclick="filterNodes('item')">
                    <span>💎 物品</span>
                    <span class="filter-count" id="countItem">0</span>
                </div>
            </div>

            <div class="node-list" id="nodeList">
                <!-- 节点列表将通过 JS 动态生成 -->
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-container">
            <canvas id="graphCanvas"></canvas>

            <!-- Stats Bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="totalNodes">0</div>
                    <div class="stat-label">节点</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalEdges">0</div>
                    <div class="stat-label">连接</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalClusters">0</div>
                    <div class="stat-label">聚类</div>
                </div>
            </div>

            <!-- Canvas Controls -->
            <div class="canvas-controls">
                <div class="control-btn" onclick="zoomIn()" title="放大">+</div>
                <div class="control-btn" onclick="zoomOut()" title="缩小">−</div>
                <div class="control-btn" onclick="resetView()" title="重置">⟲</div>
                <div class="control-btn" onclick="togglePhysics()" title="物理引擎">⚛</div>
            </div>

            <!-- Legend -->
            <div class="legend">
                <div class="legend-title">节点类型</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #d97757;"></div>
                    <span>角色</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ade80;"></div>
                    <span>地点</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fbbf24;"></div>
                    <span>事件</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f87171;"></div>
                    <span>物品</span>
                </div>
            </div>
        </div>

        <!-- Detail Panel -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-title" id="detailTitle">节点详情</div>
                <div class="detail-close" onclick="closeDetailPanel()">×</div>
            </div>
            <div class="detail-content" id="detailContent">
                <!-- 详情内容 -->
            </div>
        </div>
    </div>

    <!-- Add Node Modal -->
    <div class="modal" id="addNodeModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">添加节点</div>
                <div class="modal-close" onclick="closeModal('addNodeModal')">×</div>
            </div>
            <div>
                <label class="input-label">节点名称</label>
                <input type="text" class="input" id="nodeName" placeholder="例如：张三">

                <label class="input-label">节点类型</label>
                <select class="input" id="nodeType">
                    <option value="character">👤 角色</option>
                    <option value="location">📍 地点</option>
                    <option value="event">⚡ 事件</option>
                    <option value="item">💎 物品</option>
                </select>

                <label class="input-label">描述</label>
                <textarea class="input" id="nodeDescription" rows="3" placeholder="节点描述..."></textarea>

                <label class="input-label">关联到</label>
                <select class="input" id="connectTo">
                    <option value="">无</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary btn" onclick="closeModal('addNodeModal')">取消</button>
                <button class="btn" onclick="addNode()">添加</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 数据定义 =====
        const nodeColors = {
            character: '#d97757',
            location: '#5a8ecc',
            event: '#d4a853',
            item: '#5aab7a'
        };

        const nodeIcons = {
            character: '👤',
            location: '📍',
            event: '⚡',
            item: '💎'
        };

        // 跨页面联动：来源映射
        const SOURCE_LABELS = { 'character':'角色管理', 'wb-loc':'世界观·地点', 'wb-faction':'世界观·势力', 'wb-enc':'世界观·词条', 'novel':'书稿章节' };
        const SOURCE_LINKS  = { 'character':'character-management.html', 'wb-loc':'world-builder.html', 'wb-faction':'world-builder.html', 'wb-enc':'world-builder.html', 'novel':'main-editor.html' };
        const SOURCE_DOT    = { 'character':'#d97757', 'wb-loc':'#4ade80', 'wb-faction':'#4ade80', 'wb-enc':'#5aab7a', 'novel':'#d4a853' };

        // 示例数据

                { id: 2, name: '李四', type: 'character', x: 500, y: 400, vx: 0, vy: 0, description: '张三的室友', tags: ['配角', '室友'] },
                { id: 3, name: '王五', type: 'character', x: 300, y: 500, vx: 0, vy: 0, description: '神秘组织成员', tags: ['反派'] },
                { id: 4, name: '系统', type: 'item', x: 450, y: 200, vx: 0, vy: 0, description: '神秘的存在，赋予宿主能力', tags: ['核心'] },
                { id: 5, name: '大学', type: 'location', x: 200, y: 300, vx: 0, vy: 0, description: '故事发生的主要场所', tags: ['主要地点'] },
                { id: 6, name: '觉醒', type: 'event', x: 600, y: 300, vx: 0, vy: 0, description: '系统激活，故事开始', tags: ['关键事件'] },
                { id: 7, name: '第一次任务', type: 'event', x: 550, y: 150, vx: 0, vy: 0, description: '张三接受系统任务', tags: ['剧情推进'] },
                { id: 8, name: '苏婉', type: 'character', x: 350, y: 150, vx: 0, vy: 0, description: '女主角，考古学博士', tags: ['主角', '考古'] },
            ],
            edges: [
                { from: 1, to: 2, label: '室友' },
                { from: 1, to: 3, label: '敌对' },
                { from: 1, to: 4, label: '宿主' },
                { from: 1, to: 5, label: '就读' },
                { from: 1, to: 6, label: '经历' },
                { from: 1, to: 8, label: '朋友' },
                { from: 4, to: 6, label: '触发' },
                { from: 6, to: 7, label: '导致' },
                { from: 8, to: 5, label: '访问' },
                { from: 2, to: 5, label: '就读' },
            ]
        };

        let selectedNode = null;
        let hoveredNode = null;
        let draggedNode = null;
        let canvas, ctx;
        let scale = 1;
        let offsetX = 0, offsetY = 0;
        let physicsEnabled = true;
        let currentFilter = 'all';

        // ===== 初始化 =====
        function init() {
            canvas = document.getElementById('graphCanvas');
            ctx = canvas.getContext('2d');

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            setupCanvasEvents();
            updateNodeList();
            updateStats();

            if (physicsEnabled) {
                animate();
            } else {
                draw();
            }

            loadFromStorage();
            if (!localStorage.getItem('sagebook_graph')) syncFromSources(false);
        }

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            draw();
        }

        // ===== 绘制函数 =====
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            // 绘制边
            graphData.edges.forEach(edge => {
                const fromNode = graphData.nodes.find(n => n.id === edge.from);
                const toNode = graphData.nodes.find(n => n.id === edge.to);

                if (fromNode && toNode && isNodeVisible(fromNode) && isNodeVisible(toNode)) {
                    drawEdge(fromNode, toNode, edge.label);
                }
            });

            // 绘制节点
            graphData.nodes.forEach(node => {
                if (isNodeVisible(node)) {
                    drawNode(node);
                }
            });

            ctx.restore();
        }

        function drawNode(node) {
            const isSelected = selectedNode && selectedNode.id === node.id;
            const isHovered = hoveredNode && hoveredNode.id === node.id;
            const targetRadius = isSelected ? 35 : (isHovered ? 32 : 28);
            node.dr = (node.dr === undefined) ? 28 : node.dr;
            node.dr += (targetRadius - node.dr) * 0.18;   // 半径平滑过渡，放大/缩小更自然
            const radius = node.dr;

            // 发光效果
            if (isSelected || isHovered) {
                ctx.shadowColor = nodeColors[node.type];
                ctx.shadowBlur = 20;
            }

            // 节点圆
            ctx.beginPath();
            ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = nodeColors[node.type];
            ctx.fill();

            ctx.shadowBlur = 0;

            // 来源角标（跨页面联动节点）
            if (node.source && SOURCE_DOT[node.source]) {
                ctx.beginPath();
                ctx.arc(node.x + radius * 0.72, node.y - radius * 0.72, 6, 0, Math.PI * 2);
                ctx.fillStyle = SOURCE_DOT[node.source];
                ctx.fill();
                ctx.lineWidth = 1.5; ctx.strokeStyle = '#fff'; ctx.stroke();
            }

            // 边框
            if (isSelected) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // 图标
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(nodeIcons[node.type], node.x, node.y);

            // 名称
            ctx.font = '13px -apple-system, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(node.name, node.x, node.y + radius + 15);
        }

        function drawEdge(from, to, label) {
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);

            // 贝塞尔曲线
            const midX = (from.x + to.x) / 2;
            const midY = (from.y + to.y) / 2 - 30;
            ctx.quadraticCurveTo(midX, midY, to.x, to.y);

            ctx.strokeStyle = 'rgba(140, 138, 130, 0.35)';
            ctx.lineWidth = 2;
            ctx.setLineDash([7, 7]);   // 连线用虚线
            ctx.stroke();
            ctx.setLineDash([]);       // 复位，避免影响节点描边

            // 标签
            if (label) {
                ctx.font = '11px -apple-system, sans-serif';
                ctx.fillStyle = 'rgba(200, 198, 190, 0.75)';
                ctx.textAlign = 'center';
                ctx.fillText(label, midX, midY - 10);
            }
        }

        function isNodeVisible(node) {
            return currentFilter === 'all' || node.type === currentFilter;
        }

        // ===== 物理引擎 =====
        function animate() {
            if (physicsEnabled) {
                applyForces();
                updatePositions();
            }
            draw();
            requestAnimationFrame(animate);
        }

        function applyForces() {
            const k = 0.01; // 弹簧系数
            const repulsion = 5000; // 斥力系数
            const damping = 0.9; // 阻尼系数

            // 斥力（节点间）
            graphData.nodes.forEach(node1 => {
                graphData.nodes.forEach(node2 => {
                    if (node1.id !== node2.id) {
                        const dx = node2.x - node1.x;
                        const dy = node2.y - node1.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

                        const force = repulsion / (dist * dist);
                        node1.vx -= (dx / dist) * force * 0.1;
                        node1.vy -= (dy / dist) * force * 0.1;
                    }
                });
            });

            // 弹簧力（边）
            graphData.edges.forEach(edge => {
                const from = graphData.nodes.find(n => n.id === edge.from);
                const to = graphData.nodes.find(n => n.id === edge.to);

                if (from && to) {
                    const dx = to.x - from.x;
                    const dy = to.y - from.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                    const targetDist = 150;

                    const force = k * (dist - targetDist);
                    from.vx += (dx / dist) * force;
                    from.vy += (dy / dist) * force;
                    to.vx -= (dx / dist) * force;
                    to.vy -= (dy / dist) * force;
                }
            });

            // 引力到中心
            graphData.nodes.forEach(node => {
                node.vx += (canvas.width / 2 - node.x) * 0.0001;
                node.vy += (canvas.height / 2 - node.y) * 0.0001;
            });
        }

        function updatePositions() {
            const maxV = 14;   // 限制最大速度，避免拖拽释放后突跳
            graphData.nodes.forEach(node => {
                if (node !== draggedNode) {
                    node.vx *= 0.88;   // 更强阻尼，平顺收敛
                    node.vy *= 0.88;
                    node.vx = Math.max(-maxV, Math.min(maxV, node.vx));
                    node.vy = Math.max(-maxV, Math.min(maxV, node.vy));
                    node.x += node.vx * 0.75;   // 分步位移，运动更连续自然
                    node.y += node.vy * 0.75;
                }
            });
        }

        // ===== Canvas 事件 =====
        function setupCanvasEvents() {
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onWheel);
            canvas.addEventListener('dblclick', onDoubleClick);
        }

        function onMouseDown(e) {
            const pos = getMousePos(e);
            const node = findNodeAtPos(pos);

            if (node) {
                draggedNode = node;
                selectNode(node.id);
            } else {
                selectedNode = null;
                closeDetailPanel();
            }

            draw();
        }

        function onMouseMove(e) {
            const pos = getMousePos(e);

            if (draggedNode) {
                draggedNode.x = pos.x;
                draggedNode.y = pos.y;
            } else {
                hoveredNode = findNodeAtPos(pos);
                canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
            }

            draw();
        }

        function onMouseUp() {
            draggedNode = null;
            saveToStorage();
        }

        function onWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            scale = Math.max(0.3, Math.min(3, scale));
            draw();
        }

        function onDoubleClick(e) {
            const pos = getMousePos(e);
            const node = findNodeAtPos(pos);

            if (node) {
                // 聚焦到节点
                scale = 1.5;
                offsetX = canvas.width / 2 - node.x * scale;
                offsetY = canvas.height / 2 - node.y * scale;
                draw();
            }
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left - offsetX) / scale,
                y: (e.clientY - rect.top - offsetY) / scale
            };
        }

        function findNodeAtPos(pos) {
            return graphData.nodes.find(node => {
                const dx = pos.x - node.x;
                const dy = pos.y - node.y;
                return Math.sqrt(dx * dx + dy * dy) < 28;
            });
        }

        // ===== 控制函数 =====
        function zoomIn() {
            scale *= 1.2;
            scale = Math.min(3, scale);
            draw();
        }

        function zoomOut() {
            scale *= 0.8;
            scale = Math.max(0.3, scale);
            draw();
        }

        function resetView() {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
            draw();
        }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (physicsEnabled) {
                animate();
            }
        }

        // ===== 过滤和搜索 =====
        function filterNodes(type) {
            currentFilter = type;

            document.querySelectorAll('.filter-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.type === type) {
                    item.classList.add('active');
                }
            });

            updateNodeList();
            draw();
        }

        function searchNodes(query) {
            const lowerQuery = query.toLowerCase();
            const items = document.querySelectorAll('.node-item');

            items.forEach(item => {
                const name = item.querySelector('.node-name').textContent.toLowerCase();
                item.style.display = name.includes(lowerQuery) ? 'block' : 'none';
            });
        }

        // ===== 节点列表 =====
        function updateNodeList() {
            const list = document.getElementById('nodeList');
            const filteredNodes = currentFilter === 'all'
                ? graphData.nodes
                : graphData.nodes.filter(n => n.type === currentFilter);

            list.innerHTML = filteredNodes.map(node => `
                <div class="node-item ${selectedNode && selectedNode.id === node.id ? 'selected' : ''}"
                     onclick="selectNode('${node.id}')">
                    <div>
                        <span class="node-type">${nodeIcons[node.type]}</span>
                        <span class="node-name">${node.name}</span>
                    </div>
                    <div class="node-meta">${node.description.substring(0, 20)}...</div>
                </div>
            `).join('');

            updateCounts();
        }

        function updateCounts() {
            document.getElementById('countAll').textContent = graphData.nodes.length;
            document.getElementById('countCharacter').textContent = graphData.nodes.filter(n => n.type === 'character').length;
            document.getElementById('countLocation').textContent = graphData.nodes.filter(n => n.type === 'location').length;
            document.getElementById('countEvent').textContent = graphData.nodes.filter(n => n.type === 'event').length;
            document.getElementById('countItem').textContent = graphData.nodes.filter(n => n.type === 'item').length;
        }

        function selectNode(id) {
            const node = graphData.nodes.find(n => String(n.id) === String(id));
            if (node) {
                selectedNode = node;
                showNodeDetail(node);

                // 聚焦到节点
                scale = 1.2;
                offsetX = canvas.width / 2 - node.x * scale;
                offsetY = canvas.height / 2 - node.y * scale;

                updateNodeList();
                draw();
            }
        }

        // ===== 节点详情 =====
        function showNodeDetail(node) {
            document.getElementById('detailPanel').classList.add('show');
            document.getElementById('detailTitle').textContent = node.name;

            // 获取连接
            const connections = graphData.edges
                .filter(e => e.from === node.id || e.to === node.id)
                .map(e => {
                    const otherId = e.from === node.id ? e.to : e.from;
                    const other = graphData.nodes.find(n => n.id === otherId);
                    return { node: other, label: e.label };
                });

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-section">
                    <div class="detail-section-title">基本信息</div>
                    <div class="detail-field">
                        <div class="detail-label">类型</div>
                        <div class="detail-value">${nodeIcons[node.type]} ${node.type === 'character' ? '角色' : node.type === 'location' ? '地点' : node.type === 'event' ? '事件' : '物品'}</div>
                    </div>
                    <div class="detail-field">
                        <div class="detail-label">描述</div>
                        <div class="detail-value">${node.description}</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">标签</div>
                    <div class="tag-list">
                        ${node.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">关联 (${connections.length})</div>
                    ${connections.map(conn => `
                        <div class="connection-item" onclick="selectNode('${conn.node.id}')">
                            <div class="connection-type">${conn.label}</div>
                            <div class="connection-name">${nodeIcons[conn.node.type]} ${conn.node.name}</div>
                        </div>
                    `).join('')}
                </div>

                ${node.source ? `
                <div class="detail-section">
                    <div class="detail-section-title">来源</div>
                    <div class="detail-field">
                        <div class="detail-label">来自</div>
                        <div class="detail-value">${SOURCE_LABELS[node.source] || node.source}
                            <button class="btn" style="margin-left:10px;padding:5px 12px;font-size:12px;" onclick="openSource('${node.source}','${String(node.sourceId||'').replace(/'/g,'')}')">打开原内容 🔗</button>
                        </div>
                    </div>
                </div>` : ''}

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn" onclick="editNode('${node.id}')">编辑</button>
                    <button class="btn-secondary btn" onclick="deleteNode('${node.id}')">删除</button>
                </div>
            `;
        }

        // ===== 跨页面内容联动 =====
        function readExternalSources() {
            const out = { nodes: [], edges: [] };
            const rnd = () => ({ x: Math.random() * 600 + 150, y: Math.random() * 400 + 150, vx: 0, vy: 0 });
            // 角色
            let chars = [];
            try { chars = JSON.parse(localStorage.getItem('sagebook_characters') || '[]'); } catch (e) { chars = []; }
            if (Array.isArray(chars)) {
                chars.forEach(c => {
                    if (!c || !c.name) return;
                    const nid = 'ext-char-' + (c.id != null ? c.id : c.name);
                    out.nodes.push(Object.assign({ id: nid, name: c.name, type: 'character',
                        description: c.description || (c.role ? '身份：' + c.role : '来自角色管理'),
                        tags: c.role ? [c.role] : ['角色'], source: 'character', sourceId: c.id }, rnd()));
                });
                chars.forEach(c => {
                    if (!c || !Array.isArray(c.relationships)) return;
                    const fromId = 'ext-char-' + (c.id != null ? c.id : c.name);
                    c.relationships.forEach(r => {
                        if (!r) return;
                        const toId = 'ext-char-' + r.charId;
                        if (toId !== fromId) out.edges.push({ from: fromId, to: toId, label: r.type || '关联', ext: true });
                    });
                });
            }
            // 世界观·地点（字符串数组）
            let locs = [];
            try { locs = JSON.parse(localStorage.getItem('sagebook_wb_loc') || '[]'); } catch (e) { locs = []; }
            (Array.isArray(locs) ? locs : []).forEach((l, i) => {
                const name = typeof l === 'string' ? l : (l && l.name); if (!name) return;
                out.nodes.push(Object.assign({ id: 'ext-loc-' + i, name: name, type: 'location',
                    description: '来自世界观设定的地点', tags: ['地点'], source: 'wb-loc' }, rnd()));
            });
            // 世界观·势力
            let facs = [];
            try { facs = JSON.parse(localStorage.getItem('sagebook_wb_factions') || '[]'); } catch (e) { facs = []; }
            (Array.isArray(facs) ? facs : []).forEach((f, i) => {
                if (!f || !f.name) return;
                out.nodes.push(Object.assign({ id: 'ext-fac-' + i, name: f.name, type: 'location',
                    description: f.desc || '来自世界观设定的势力', tags: ['势力'], source: 'wb-faction' }, rnd()));
            });
            // 世界观·词条
            let enc = [];
            try { enc = JSON.parse(localStorage.getItem('sagebook_wb_enc') || '[]'); } catch (e) { enc = []; }
            (Array.isArray(enc) ? enc : []).forEach((e2, i) => {
                if (!e2 || !e2.title) return;
                out.nodes.push(Object.assign({ id: 'ext-enc-' + i, name: e2.title, type: 'item',
                    description: e2.content || '来自世界观词条', tags: ['词条'], source: 'wb-enc' }, rnd()));
            });
            // 书稿章节
            let novel = null;
            try { novel = JSON.parse(localStorage.getItem('sagebook_novel') || 'null'); } catch (e) { novel = null; }
            if (novel && novel.chapters) {
                const ids = Object.keys(novel.chapters);
                ids.forEach((cid, i) => {
                    const ch = novel.chapters[cid]; if (!ch) return;
                    const title = (ch.title || '未命名').replace(/\.md$/, '');
                    out.nodes.push(Object.assign({ id: 'ext-ch-' + cid, name: title, type: 'event',
                        description: (ch.content || '').slice(0, 60) || '书稿章节', tags: ['章节'], source: 'novel', sourceId: cid }, rnd()));
                    if (i > 0) out.edges.push({ from: 'ext-ch-' + ids[i - 1], to: 'ext-ch-' + cid, label: '衔接', ext: true });
                });
            }
            return out;
        }
        function syncFromSources(showTip) {
            const ext = readExternalSources();
            graphData.nodes = graphData.nodes.filter(n => !n.source);
            graphData.edges = graphData.edges.filter(e => !e.ext);
            graphData.nodes = graphData.nodes.concat(ext.nodes);
            graphData.edges = graphData.edges.concat(ext.edges);
            updateNodeList();
            updateCounts();
            draw();
            saveToStorage();
            if (showTip !== false) {
                const n = ext.nodes.length;
                showKgToast(n > 0 ? ('已同步 ' + n + ' 个跨页面节点（角色/地点/势力/词条/章节）') : '其他页面暂无可同步的内容');
            }
        }
        function openSource(source, sourceId) {
            const url = SOURCE_LINKS[source];
            if (url) window.open(url + (source === 'novel' && sourceId ? ('#ch-' + sourceId) : ''), '_blank');
        }
        function showKgToast(msg) {
            const t = document.getElementById('kgToast');
            if (!t) { console.log(msg); return; }
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2800);
        }

        function closeDetailPanel() {
            document.getElementById('detailPanel').classList.remove('show');
            selectedNode = null;
            updateNodeList();
            draw();
        }

        // ===== CRUD 操作 =====
        function showAddNodeModal() {
            // 更新连接选项
            const connectSelect = document.getElementById('connectTo');
            connectSelect.innerHTML = '<option value="">无</option>' +
                graphData.nodes.map(n => `<option value="${n.id}">${nodeIcons[n.type]} ${n.name}</option>`).join('');

            document.getElementById('addNodeModal').classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function addNode() {
            const name = document.getElementById('nodeName').value;
            const type = document.getElementById('nodeType').value;
            const description = document.getElementById('nodeDescription').value;
            const connectTo = document.getElementById('connectTo').value;

            if (!name) {
                alert('请输入节点名称');
                return;
            }

            const newId = Math.max(...graphData.nodes.map(n => n.id)) + 1;
            const newNode = {
                id: newId,
                name: name,
                type: type,
                x: canvas.width / 2 + Math.random() * 100,
                y: canvas.height / 2 + Math.random() * 100,
                vx: 0,
                vy: 0,
                description: description || '暂无描述',
                tags: []
            };

            graphData.nodes.push(newNode);

            if (connectTo) {
                graphData.edges.push({
                    from: parseInt(connectTo),
                    to: newId,
                    label: '关联'
                });
            }

            updateNodeList();
            updateStats();
            saveToStorage();
            closeModal('addNodeModal');

            // 清空表单
            document.getElementById('nodeName').value = '';
            document.getElementById('nodeDescription').value = '';
            document.getElementById('connectTo').value = '';
        }

        function editNode(id) {
            const node = graphData.nodes.find(n => String(n.id) === String(id));
            if (node) {
                const newName = prompt('编辑节点名称:', node.name);
                if (newName) {
                    node.name = newName;
                    updateNodeList();
                    showNodeDetail(node);
                    saveToStorage();
                }
            }
        }

        function deleteNode(id) {
            if (confirm('确定要删除这个节点吗？')) {
                graphData.nodes = graphData.nodes.filter(n => String(n.id) !== String(id));
                graphData.edges = graphData.edges.filter(e => String(e.from) !== String(id) && String(e.to) !== String(id));

                updateNodeList();
                updateStats();
                closeDetailPanel();
                saveToStorage();
            }
        }

        // ===== 统计 =====
        function updateStats() {
            document.getElementById('totalNodes').textContent = graphData.nodes.length;
            document.getElementById('totalEdges').textContent = graphData.edges.length;
            document.getElementById('totalClusters').textContent = Math.ceil(graphData.nodes.length / 3);
        }

        // ===== 导出 =====
        function exportGraph() {
            const format = confirm('导出为 PNG 图片？\n\n✅ 确定 = 导出 PNG 图片\n❌ 取消 = 导出 JSON 数据');
            
            if (format) {
                // 导出为 PNG 图片
                const canvas = document.getElementById('graphCanvas');
                const link = document.createElement('a');
                link.download = 'knowledge-graph.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                alert('✅ 图谱已导出为 PNG 图片');
            } else {
                // 导出为 JSON 数据
                const data = JSON.stringify(graphData, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'knowledge-graph.json';
                a.click();
                URL.revokeObjectURL(url);
                alert('✅ 图谱数据已导出为 JSON');
            }
        }

        // ===== 存储 =====
        function saveToStorage() {
            localStorage.setItem('sagebook_graph', JSON.stringify(graphData));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('sagebook_graph');
            if (saved) {
                try {
                    graphData = JSON.parse(saved);
                    updateNodeList();
                    updateStats();
                } catch(e) {
                    console.log('加载图谱数据失败');
                }
            }
        }

        // 移动端侧边栏切换
        function toggleMobileSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // 点击空白处关闭移动端侧边栏
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                const sidebar = document.querySelector('.sidebar');
                const menuBtn = document.querySelector('.mobile-menu-btn');
                if (sidebar && sidebar.classList.contains('mobile-open') &&
                    !sidebar.contains(e.target) &&
                    menuBtn && !menuBtn.contains(e.target)) {
                    sidebar.classList.remove('mobile-open');
                }
            }
        });

        // 初始化
        window.addEventListener('load', init);
    </script>
