<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE BOOK - 模板库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root[data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252525;
            --bg-tertiary: #2a2a2a;
            --bg-hover: #2f2f2f;
            --bg-active: #383838;
            --text-primary: #dcddde;
            --text-secondary: #999999;
            --text-muted: #666666;
            --accent: #7c5cbf;
            --accent-hover: #8d6fd4;
            --accent-light: #a78bfa;
            --border: #3e3e3e;
            --border-light: #4a4a4a;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #f87171;
        }

        :root[data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #eeeeee;
            --bg-hover: #e8e8e8;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #7c5cbf;
            --border: #e0e0e0;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Header */
        .header {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(to right, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .nav-link.active {
            color: var(--accent-light);
            background: var(--bg-tertiary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px 15px;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .category-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .category-item {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: background 0.15s;
        }

        .category-item:hover {
            background: var(--bg-hover);
        }

        .category-item.active {
            background: var(--accent);
            color: white;
        }

        .category-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-muted);
        }

        .category-item.active .category-count {
            color: rgba(255,255,255,0.8);
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            padding: 30px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .content-title {
            font-size: 28px;
            font-weight: 600;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 300px;
            padding: 10px 15px 10px 35px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* 模板网格 */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .template-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }

        .template-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(124, 92, 191, 0.15);
            transform: translateY(-2px);
        }

        .template-preview {
            height: 140px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            overflow: hidden;
        }

        .template-preview-content {
            padding: 15px;
            font-size: 11px;
            line-height: 1.5;
            color: var(--text-secondary);
            text-align: left;
            width: 100%;
            white-space: pre-wrap;
        }

        .template-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            background: var(--accent);
            color: white;
            border-radius: 4px;
            font-size: 10px;
        }

        .template-body {
            padding: 15px;
        }

        .template-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .template-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .template-meta {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 按钮 */
        .btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 0;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            font-size: 20px;
        }

        .modal-close:hover {
            background: var(--bg-hover);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 模板预览 */
        .template-full-preview {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.8;
            max-height: 300px;
            overflow-y: auto;
        }

        .template-variables {
            margin-bottom: 20px;
        }

        .variable-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .variable-label {
            width: 120px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .variable-input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .variable-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* 主题切换 */
        .theme-switcher {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .theme-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .theme-btn:hover {
            color: var(--text-primary);
        }

        .theme-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0 10px;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .menu-bar {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .menu-item {
                padding: 0 10px;
            }
            
            .main-content,
            .content-area {
                padding: 10px;
            }
            
            .sidebar {
                position: fixed;
                left: -280px;
                width: 280px;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
            }
            
            .sidebar.mobile-open {
                left: 0;
            }
            
            .mobile-menu-btn {
                display: block !important;
            }
            
            .btn-group {
                flex-wrap: wrap;
            }
            
            .modal-content {
                width: 95%;
                padding: 15px;
            }
            
            .editor-pane {
                font-size: 16px;
            }
            
            .stats-bar {
                flex-wrap: wrap;
                gap: 5px;
            }
            
            .ai-panel {
                width: 100%;
                position: fixed;
                bottom: 0;
                right: 0;
                height: 50%;
            }
        }
        
        @media (max-width: 480px) {
            .toolbar-title {
                font-size: 12px;
            }
            
            .menu-bar {
                height: auto;
                flex-wrap: wrap;
            }
            
            .dropdown-menu {
                position: fixed;
                width: 100%;
                left: 0 !important;
            }
            
            .settings-group {
                padding: 15px;
            }
            
            .setting-item {
                padding: 10px;
            }
        }
        
        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .mobile-menu-btn:active {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text">SAGEBOOK</span>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-link">🏠 首页</a>
            <a href="main-editor.html" class="nav-link">编辑器</a>
            <a href="character-management.html" class="nav-link">角色</a>
            <a href="template-gallery.html" class="nav-link active">模板</a>
            <a href="outline-editor.html" class="nav-link">大纲</a>
            <a href="knowledge-graph.html" class="nav-link">图谱</a>
            <a href="settings.html" class="nav-link">设置</a>
        </nav>
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="菜单">☰</button>
        <div class="header-actions">
            <div class="theme-switcher">
                <button class="theme-btn" onclick="setTheme('light')" id="themeLight">☀️</button>
                <button class="theme-btn active" onclick="setTheme('dark')" id="themeDark">🌙</button>
                <button class="theme-btn" onclick="setTheme('system')" id="themeSystem">💻</button>
            </div>
            <button class="btn" onclick="showCreateTemplateModal()">+ 创建模板</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="category-title">模板分类</div>
            <div class="category-item active" data-category="all" onclick="filterTemplates('all')">
                <span>📋 全部模板</span>
                <span class="category-count" id="countAll">0</span>
            </div>
            <div class="category-item" data-category="chapter" onclick="filterTemplates('chapter')">
                <span>📖 章节模板</span>
                <span class="category-count" id="countChapter">0</span>
            </div>
            <div class="category-item" data-category="scene" onclick="filterTemplates('scene')">
                <span>🎬 场景模板</span>
                <span class="category-count" id="countScene">0</span>
            </div>
            <div class="category-item" data-category="dialogue" onclick="filterTemplates('dialogue')">
                <span>💬 对话模板</span>
                <span class="category-count" id="countDialogue">0</span>
            </div>
            <div class="category-item" data-category="character" onclick="filterTemplates('character')">
                <span>👤 角色模板</span>
                <span class="category-count" id="countCharacter">0</span>
            </div>
            <div class="category-item" data-category="world" onclick="filterTemplates('world')">
                <span>🌍 世界观模板</span>
                <span class="category-count" id="countWorld">0</span>
            </div>
            <div class="category-item" data-category="custom" onclick="filterTemplates('custom')">
                <span>⭐ 我的模板</span>
                <span class="category-count" id="countCustom">0</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-header">
                <div class="content-title">模板库</div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="搜索模板..." id="searchInput" oninput="searchTemplates(this.value)">
                </div>
            </div>

            <div class="templates-grid" id="templatesGrid">
                <!-- 模板卡片将通过 JS 动态生成 -->
            </div>
        </div>
    </div>

    <!-- Template Detail Modal -->
    <div class="modal" id="templateModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">模板详情</div>
                <div class="modal-close" onclick="closeModal('templateModal')">×</div>
            </div>
            <div class="modal-body">
                <div class="template-full-preview" id="templatePreview"></div>

                <div class="template-variables" id="templateVariables">
                    <!-- 变量输入将通过 JS 动态生成 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary btn" onclick="copyTemplate()">📋 复制内容</button>
                <button class="btn" onclick="useTemplate()">✅ 使用模板</button>
            </div>
        </div>
    </div>

    <!-- Create Template Modal -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">创建模板</div>
                <div class="modal-close" onclick="closeModal('createModal')">×</div>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">模板名称</label>
                    <input type="text" class="variable-input" id="newTemplateName" placeholder="例如：我的章节模板" style="width: 100%;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">分类</label>
                    <select class="variable-input" id="newTemplateCategory" style="width: 100%;">
                        <option value="custom">我的模板</option>
                        <option value="chapter">章节模板</option>
                        <option value="scene">场景模板</option>
                        <option value="dialogue">对话模板</option>
                        <option value="character">角色模板</option>
                        <option value="world">世界观模板</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px;">模板内容</label>
                    <textarea class="variable-input" id="newTemplateContent" style="width: 100%; min-height: 200px;" placeholder="输入模板内容，可以使用 {{变量名}} 创建变量"></textarea>
                </div>
                <div style="background: var(--bg-tertiary); padding: 12px; border-radius: 6px; font-size: 12px; color: var(--text-secondary);">
                    💡 提示：使用 {{变量名}} 格式创建可替换的变量，例如：{{章节名}}、{{角色名}}
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary btn" onclick="closeModal('createModal')">取消</button>
                <button class="btn" onclick="saveNewTemplate()">保存模板</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastMessage">操作成功</span>
    </div>

    <script>
        // ===== 数据定义 =====
        let templates = [
            {
                id: 1,

                usage: 128,
                badge: '热门'
            },
            {
                id: 2,
                name: '序章/引子',
                category: 'chapter',
                description: '用于小说开头的序章或引子',
                preview: '序章 {{标题}}\n\n{{背景铺垫}}\n\n---\n\n{{核心事件}}\n\n---\n\n【悬念收尾】\n{{悬念描述}}',

            {

                usage: 34,

            },
            {
                id: 7,
                name: '心理活动',
                category: 'scene',
                description: '角色内心独白和心理活动',
                preview: '💭 {{角色名}}的内心\n\n{{内心独白}}\n\n【情绪变化】\n{{情绪描写}}\n\n【决策】\n最终，{{角色名}}决定{{决策内容}}。',
                usage: 156,
                badge: '推荐'
            },
            {
                id: 8,
                name: '回忆/闪回',
                category: 'scene',
                description: '回忆过去的场景模板',
                preview: '⏮️ 回忆\n\n【触发点】\n{{触发回忆的原因}}\n\n【回忆内容】\n{{回忆场景}}\n\n【情感】\n{{情感描写}}\n\n【回归现实】\n{{回归描写}}',
                usage: 78,
                badge: null
            },
            {
                id: 9,
                name: '转折点',
                category: 'scene',
                description: '剧情重大转折的描写模板',
                preview: '⚡ 剧情转折\n\n【铺垫】\n{{铺垫内容}}\n\n【转折事件】\n{{转折事件}}\n\n【冲击】\n{{角色反应}}\n\n【后续影响】\n{{影响描述}}',
                usage: 56,
                badge: null
            },
            {
                id: 10,
                name: '组队/结盟',
                category: 'scene',
                description: '角色组队或结盟的场景',
                preview: '🤝 结盟时刻\n\n【契机】\n{{结盟契机}}\n\n【谈判】\n{{谈判过程}}\n\n【约定】\n{{结盟条件}}\n\n【誓言】\n"{{誓言内容}}"',
                usage: 23,
                badge: null
            },
            {
                id: 11,
                name: '训练/成长',
                category: 'scene',
                description: '角色训练或成长的场景',
                preview: '📈 成长之路\n\n【起点】\n{{当前状态}}\n\n【训练内容】\n{{训练描写}}\n\n【困难】\n{{遇到的困难}}\n\n【突破】\n{{突破时刻}}\n\n【成果】\n{{成长结果}}',
                usage: 67,
                badge: null
            },
            {
                id: 12,
                name: '伏笔设置',
                category: 'scene',
                description: '巧妙设置伏笔的模板',
                preview: '🔍 伏笔\n\n【表面内容】\n{{看似普通的描述}}\n\n【隐藏含义】\n<!-- 实际暗示：{{真实含义}} -->\n\n【后续揭示】\n将在第{{章节号}}章揭示：{{揭示内容}}',
                usage: 89,
                badge: '推荐'
            }
        ];

        let customTemplates = [];
        let currentTemplate = null;
        let currentFilter = 'all';

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            loadFromStorage();
            renderTemplates();
            updateCounts();
            initTheme();
        });

        // ===== 主题 =====
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('theme' + theme.charAt(0).toUpperCase() + theme.slice(1)).classList.add('active');
        }

        // ===== 过滤和搜索 =====
        function filterTemplates(category) {
            currentFilter = category;

            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.category === category) {
                    item.classList.add('active');
                }
            });

            renderTemplates();
        }

        function searchTemplates(query) {
            const lowerQuery = query.toLowerCase();
            const allTemplates = [...templates, ...customTemplates];
            const filtered = allTemplates.filter(t =>
                t.name.toLowerCase().includes(lowerQuery) ||
                t.description.toLowerCase().includes(lowerQuery) ||
                t.category.includes(lowerQuery)
            );

            renderTemplateCards(filtered);
        }

        // ===== 渲染 =====
        function renderTemplates() {
            const allTemplates = [...templates, ...customTemplates];
            const filtered = currentFilter === 'all'
                ? allTemplates
                : allTemplates.filter(t => t.category === currentFilter);

            renderTemplateCards(filtered);
        }

        function renderTemplateCards(tpls) {
            const grid = document.getElementById('templatesGrid');

            grid.innerHTML = tpls.map(t => `
                <div class="template-card" onclick="showTemplateDetail(${t.id})">
                    <div class="template-preview">
                        <div class="template-preview-content">${t.preview.substring(0, 150)}...</div>
                        ${t.badge ? `<div class="template-badge">${t.badge}</div>` : ''}
                    </div>
                    <div class="template-body">
                        <div class="template-name">${t.name}</div>
                        <div class="template-desc">${t.description}</div>
                        <div class="template-meta">
                            <span>📂 ${getCategoryName(t.category)}</span>
                            <span>📊 使用 ${t.usage} 次</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getCategoryName(category) {
            const names = {
                chapter: '章节',
                scene: '场景',
                dialogue: '对话',
                character: '角色',
                world: '世界观',
                custom: '自定义'
            };
            return names[category] || category;
        }

        function updateCounts() {
            const allTemplates = [...templates, ...customTemplates];

            document.getElementById('countAll').textContent = allTemplates.length;
            document.getElementById('countChapter').textContent = allTemplates.filter(t => t.category === 'chapter').length;
            document.getElementById('countScene').textContent = allTemplates.filter(t => t.category === 'scene').length;
            document.getElementById('countDialogue').textContent = allTemplates.filter(t => t.category === 'dialogue').length;
            document.getElementById('countCharacter').textContent = allTemplates.filter(t => t.category === 'character').length;
            document.getElementById('countWorld').textContent = allTemplates.filter(t => t.category === 'world').length;
            document.getElementById('countCustom').textContent = customTemplates.length;
        }

        // ===== 模板详情 =====
        function showTemplateDetail(id) {
            const allTemplates = [...templates, ...customTemplates];
            currentTemplate = allTemplates.find(t => t.id === id);

            if (!currentTemplate) return;

            document.getElementById('modalTitle').textContent = currentTemplate.name;
            document.getElementById('templatePreview').textContent = currentTemplate.preview;

            // 提取变量
            const variableRegex = /\{\{(.+?)\}\}/g;
            const variables = [];
            let match;

            while ((match = variableRegex.exec(currentTemplate.preview)) !== null) {
                if (!variables.includes(match[1])) {
                    variables.push(match[1]);
                }
            }

            // 生成变量输入
            const variablesContainer = document.getElementById('templateVariables');
            if (variables.length > 0) {
                variablesContainer.innerHTML = '<h4 style="font-size: 14px; margin-bottom: 15px;">填写变量</h4>' +
                    variables.map(v => `
                        <div class="variable-item">
                            <div class="variable-label">${v}</div>
                            <input type="text" class="variable-input" id="var_${v}" placeholder="输入${v}">
                        </div>
                    `).join('');
            } else {
                variablesContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 13px;">此模板没有变量，可直接使用</div>';
            }

            document.getElementById('templateModal').classList.add('show');
        }

        function copyTemplate() {
            if (!currentTemplate) return;

            let content = currentTemplate.preview;

            // 替换变量
            const variableRegex = /\{\{(.+?)\}\}/g;
            content = content.replace(variableRegex, (match, variable) => {
                const input = document.getElementById(`var_${variable}`);
                return input && input.value ? input.value : match;
            });

            navigator.clipboard.writeText(content);
            showToast('已复制到剪贴板');
        }

        function useTemplate() {
            if (!currentTemplate) return;

            let content = currentTemplate.preview;

            // 替换变量
            const variableRegex = /\{\{(.+?)\}\}/g;
            content = content.replace(variableRegex, (match, variable) => {
                const input = document.getElementById(`var_${variable}`);
                return input && input.value ? input.value : match;
            });

            // 保存到 localStorage 供编辑器使用
            localStorage.setItem('sagebook_template_content', content);

            // 跳转到编辑器
            window.location.href = 'main-editor.html';

            // 更新使用次数
            currentTemplate.usage++;
            saveToStorage();
        }

        // ===== 创建模板 =====
        function showCreateTemplateModal() {
            document.getElementById('newTemplateName').value = '';
            document.getElementById('newTemplateCategory').value = 'custom';
            document.getElementById('newTemplateContent').value = '';
            document.getElementById('createModal').classList.add('show');
        }

        function saveNewTemplate() {
            const name = document.getElementById('newTemplateName').value.trim();
            const category = document.getElementById('newTemplateCategory').value;
            const content = document.getElementById('newTemplateContent').value.trim();

            if (!name || !content) {
                showToast('请填写完整信息', 'error');
                return;
            }

            const newTemplate = {
                id: Date.now(),
                name: name,
                category: category,
                description: '自定义模板',
                preview: content,
                usage: 0,
                badge: null
            };

            customTemplates.push(newTemplate);
            saveToStorage();
            renderTemplates();
            updateCounts();
            closeModal('createModal');
            showToast('模板创建成功');
        }

        // ===== 工具函数 =====
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function toggleMobileSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                const sidebar = document.querySelector('.sidebar');
                const menuBtn = document.querySelector('.mobile-menu-btn');
                if (sidebar && sidebar.classList.contains('mobile-open') &&
                    !sidebar.contains(e.target) &&
                    menuBtn && !menuBtn.contains(e.target)) {
                    sidebar.classList.remove('mobile-open');
                }
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function saveToStorage() {
            localStorage.setItem('sagebook_custom_templates', JSON.stringify(customTemplates));
            localStorage.setItem('sagebook_templates', JSON.stringify(templates));
        }

        function loadFromStorage() {
            const savedCustom = localStorage.getItem('sagebook_custom_templates');
            if (savedCustom) {
                try {
                    customTemplates = JSON.parse(savedCustom);
                } catch(e) {}
            }

            const savedTemplates = localStorage.getItem('sagebook_templates');
            if (savedTemplates) {
                try {
                    templates = JSON.parse(savedTemplates);
                } catch(e) {}
            }
        }
    </script>
</body>
</html>
