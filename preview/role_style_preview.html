<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色管理样式预览</title>
  <style>
    /* 角色管理页面样式 - Qclaw */
    :root {
      /* 从图片提取的主色调 */
      --primary: #FF6B6B;
      --primary-hover: #FA5252;
      --bg-color: #FFF5F5;
      --card-bg: #FFFFFF;
      --text-main: #2C3E50;
      --text-sub: #7F8C8D;
      --border-color: #FFD6D6;
      --input-bg: #FFFAFA;
      --shadow: 0 4px 12px rgba(255, 107, 107, 0.12);
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .preview-container {
      max-width: 800px;
      margin: 0 auto;
    }

    .role-manager {
      background-color: var(--bg-color);
      padding: 24px;
      border-radius: 16px;
    }

    .role-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .role-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
    }

    .role-description {
      color: var(--text-sub);
      margin-top: 4px;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-outline {
      background-color: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-outline:hover {
      background-color: var(--primary);
      color: white;
    }

    /* 角色列表卡片 */
    .role-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .role-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .role-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 107, 107, 0.18);
    }

    .role-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .role-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-active {
      background-color: #E8F5E9;
      color: #4CAF50;
    }

    .badge-inactive {
      background-color: #FFEBEE;
      color: #EF4444;
    }

    .role-desc {
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .role-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    /* 空状态 */
    .role-empty {
      text-align: center;
      padding: 40px;
      color: var(--text-sub);
    }

    .role-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
    }

    .page-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      background-color: var(--card-bg);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-main);
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
    }

    .page-btn.active {
      background-color: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 加载状态 */
    .role-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式适配 */
    @media (max-width: 768px) {
      .role-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .role-title {
        font-size: 18px;
      }

      .role-card {
        padding: 16px;
      }

      .role-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .pagination {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="role-manager">
      <div class="role-header">
        <div>
          <div class="role-title">角色管理</div>
          <div class="role-description">管理你的 AI 助手角色配置</div>
        </div>
        <button class="btn-primary">添加角色</button>
      </div>

      <div class="role-list">
        <div class="role-card">
          <div class="role-card-header">
            <div class="role-name">智能助手</div>
            <span class="role-badge badge-active">已激活</span>
          </div>
          <div class="role-desc">一个智能、乐于助人的 AI 助手，能够回答问题、提供建议、协助完成任务。</div>
          <div class="role-actions">
            <button class="btn-outline">编辑</button>
            <button class="btn-outline">停用</button>
          </div>
        </div>

        <div class="role-card">
          <div class="role-card-header">
            <div class="role-name">代码专家</div>
            <span class="role-badge badge-active">已激活</span>
          </div>
          <div class="role-desc">精通编程的 AI 助手，能够编写、调试和优化代码。</div>
          <div class="role-actions">
            <button class="btn-outline">编辑</button>
            <button class="btn-outline">停用</button>
          </div>
        </div>

        <div class="role-card">
          <div class="role-card-header">
            <div class="role-name">创意写作</div>
            <span class="role-badge badge-inactive">已停用</span>
          </div>
          <div class="role-desc">擅长创意写作的 AI 助手，能够创作小说、诗歌、剧本等。</div>
          <div class="role-actions">
            <button class="btn-outline">编辑</button>
            <button class="btn-outline">启用</button>
          </div>
        </div>
      </div>

      <div class="pagination">
        <button class="page-btn">上一页</button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">下一页</button>
      </div>
    </div>
  </div>
</body>
</html>
