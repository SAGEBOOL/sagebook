<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SAGE BOOK - 拆书技能</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg-primary:#141413;--bg-secondary:#1c1c1a;--bg-tertiary:#2a2a28;--bg-hover:#333331;--bg-input:#1a1a19;--bg-card:#1c1c1a;--text-primary:#f0eee6;--text-secondary:#c8c6bd;--text-tertiary:#8b8a82;--text-muted:#5c5b55;--border:#3d3d3a;--accent:#d97757;--accent-hover:#e08a6e;--accent-light:#e08a6e;--accent-glow:rgba(217,119,87,0.3);--success:#5aab7a;--warning:#d4a853;--error:#e05555;
        }
        :root[data-theme="light"] {
            --bg-primary:#f7f5f0;--bg-secondary:#ffffff;--bg-tertiary:#efece6;--bg-hover:#e6e2da;--bg-input:#ffffff;--bg-card:#ffffff;--text-primary:#1c1b19;--text-secondary:#4a4843;--text-tertiary:#7a776f;--text-muted:#9a968c;--border:#d8d4cc;--accent:#c2410c;--accent-hover:#b85a3a;--accent-light:#d97757;--accent-glow:rgba(217,119,87,0.2);--success:#2f8f5b;--warning:#b07a1f;--error:#c0392b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 36px 20px 16px; position: relative; }
        .title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
        .subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
        .nav { display: flex; justify-content: center; gap: 16px; margin: 18px 0 8px; flex-wrap: wrap; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; }
        .nav-link:hover { color: var(--text-primary); background: var(--bg-hover); }
        .nav-link.active { color: var(--accent); background: var(--bg-tertiary); border: 1px solid var(--border); }
        .theme-switcher { position: fixed; top: 15px; right: 20px; display: flex; gap: 4px; z-index: 100; }
        .theme-btn { padding: 6px 10px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .theme-btn:hover { border-color: var(--accent); }
        .theme-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin: 18px 0; }
        .panel-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .editor-box { width: 100%; min-height: 240px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); padding: 14px; font-size: 14px; line-height: 1.8; font-family: inherit; resize: vertical; }
        .editor-box:focus { outline: none; border-color: var(--accent); }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 14px 0 0; }
        .btn { padding: 9px 18px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 9px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); }
        .btn:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .hint { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; line-height: 1.7; }
        .note { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
        .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--text-tertiary); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
        .stat-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-value { font-size: 26px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        .result { white-space: pre-wrap; line-height: 1.9; font-size: 14px; color: var(--text-primary); }
        .result h2 { font-size: 18px; font-weight: 800; color: var(--accent); margin: 18px 0 8px; }
        .result h3 { font-size: 15px; font-weight: 700; margin: 14px 0 6px; color: var(--text-primary); }
        .result ul { padding-left: 22px; margin: 6px 0; }
        .result li { margin: 4px 0; }
        .result strong { color: var(--accent-light); }
        .result p { margin: 6px 0; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s; z-index: 200; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .footer { text-align: center; padding: 30px 20px; font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 30px; }
        .footer a { color: var(--accent); text-decoration: none; }
        @media (max-width: 768px) { .title { font-size: 24px; } .nav { gap: 8px; } .nav-link { font-size: 13px; padding: 5px 9px; } }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn active" onclick="setTheme('dark')">🌙</button>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('system')">💻</button>
    </div>
    <div class="container">
        <div class="header">
            <div class="title">📖 拆书技能</div>
            <div class="subtitle">拆解优质小说，萃取可借鉴的写法 · 内容总结 / 结构拆解 / 技巧借鉴</div>
            <nav class="nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="main-editor.html" class="nav-link">编辑器</a>
                <a href="outline-editor.html" class="nav-link">知识库</a>
                <a href="character-management.html" class="nav-link">角色</a>
                <a href="world-builder.html" class="nav-link">世界观</a>
                <a href="knowledge-graph.html" class="nav-link">图谱</a>
                <a href="writing-analysis.html" class="nav-link">分析</a>
                <a href="book-deconstruction.html" class="nav-link active">拆书</a>
                <a href="platform-tools.html" class="nav-link">平台</a>
                <a href="ai-suite.html" class="nav-link">AI</a>
                <a href="settings.html" class="nav-link">设置</a>
            </nav>
        </div>

        <!-- 输入区 -->
        <div class="panel">
            <div class="panel-title">📝 贴入要拆解的小说</div>
            <textarea id="bookText" class="editor-box" placeholder="把一段或整篇优质小说粘贴到这里（建议 200～8000 字效果最佳）。拆书会帮你总结内容、拆解结构、并标出值得借鉴的写法。"></textarea>
            <div class="row">
                <button class="btn" onclick="importBook()">📂 导入文件</button>
                <button class="btn" onclick="loadSample()">✨ 填入示例片段</button>
                <button class="btn" onclick="clearText()">🧹 清空</button>
                <input type="file" id="bookFile" accept=".txt,.md,.text" style="display:none" onchange="onBookFile(event)">
            </div>
            <div class="row">
                <button class="btn" id="localBtn" onclick="runLocalStats()">📊 本地速览（离线）</button>
                <button class="btn btn-primary" id="aiBtn" onclick="aiDeconstruct()">🤖 AI 深度拆书</button>
            </div>
            <div class="hint">「本地速览」无需联网，给出字数 / 章节 / 对话占比等基础统计；「AI 深度拆书」需先在 <a href="settings.html" style="color:var(--accent)">设置</a> 配置本地 Ollama 或云端模型。</div>
        </div>

        <!-- 本地速览 -->
        <div class="panel" id="localPanel" style="display:none;">
            <div class="panel-title">📊 本地速览</div>
            <div class="stats-grid" id="localStats"></div>
        </div>

        <!-- AI 结果 -->
        <div class="panel" id="aiPanel" style="display:none;">
            <div class="panel-title">🤖 拆书报告 <span style="font-size:12px;font-weight:400;color:var(--text-tertiary);">（仅供学习与借鉴，请尊重原作版权）</span></div>
            <div id="aiStatus"></div>
            <div id="aiResult" class="result" style="margin-top:12px;"></div>
            <div class="row" id="aiActions" style="display:none;">
                <button class="btn" onclick="copyResult()">📋 复制报告</button>
            </div>
        </div>

        <div class="footer">
            <p>SAGE BOOK · 拆书技能 | 分析、总结、借鉴优质小说写法</p>
            <p class="footer-legal"><a href="copyright.html">版权声明</a> · <a href="privacy.html">隐私条款</a> · <a href="terms.html">使用条款</a></p>
        </div>
    </div>

    <script>
        /* ============ 主题 ============ */
        function setTheme(t){
            const h=document.documentElement;
            if(t==='system'){ const d=window.matchMedia('(prefers-color-scheme:dark)').matches; h.setAttribute('data-theme',d?'dark':'light'); }
            else h.setAttribute('data-theme',t);
            document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
            const map={dark:'🌙',light:'☀️',system:'💻'};
            const cur=[...document.querySelectorAll('.theme-btn')].find(b=>b.textContent.trim()===map[t]);
            if(cur) cur.classList.add('active');
            localStorage.setItem('sagebook_theme',t);
        }
        (function(){ const saved=localStorage.getItem('sagebook_theme')||'dark'; setTheme(saved); })();

        /* ============ 工具 ============ */
        function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function toast(msg){ let t=document.querySelector('.toast'); if(!t){ t=document.createElement('div'); t.className='toast'; document.body.appendChild(t);} t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

        /* ============ 站点既有 AI（与设置页共享键） ============ */
        function getAIConfig(){
            const useLocal = localStorage.getItem('useLocalAI')==='true';
            return {
                mode: useLocal?'ollama':'cloud',
                ollamaUrl: localStorage.getItem('ollamaEndpoint')||'http://localhost:11434',
                ollamaModel: localStorage.getItem('localModel')||'qwen2.5:14b',
                cloudBaseUrl: localStorage.getItem('cloudBaseUrl')||'https://api.openai.com/v1',
                cloudModel: localStorage.getItem('cloudModel')||'gpt-4o',
                cloudApiKey: localStorage.getItem('cloudApiKey')||''
            };
        }
        async function callSiteAI(messages){
            const c=getAIConfig();
            if(c.mode==='ollama'){
                const url=c.ollamaUrl.replace(/\/+$/,'')+'/api/chat';
                if(location.protocol==='https:'&&url.startsWith('http://')) throw new Error('混合内容限制：HTTPS 页面无法访问本地 Ollama(http://)。请用本地服务器运行本站，或切到「云端」模式。');
                const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:c.ollamaModel,messages,stream:false,options:{temperature:0.6}}),signal:AbortSignal.timeout(120000)});
                if(!res.ok) throw new Error('Ollama 调用失败：'+res.status);
                const data=await res.json(); return data.message?.content||'';
            } else {
                if(!c.cloudApiKey) throw new Error('未配置云端 API Key（请在设置页填写）。');
                let base=(c.cloudBaseUrl||'https://api.openai.com/v1').replace(/\/+$/,'');
                if(location.protocol==='https:'&&base.startsWith('http://')) throw new Error('混合内容限制：HTTPS 页面无法请求 HTTP 地址。');
                const url=base.endsWith('/chat/completions')?base:base+'/chat/completions';
                const res=await fetch(url,{method:'POST',headers:{Authorization:`Bearer ${c.cloudApiKey}`,'Content-Type':'application/json'},body:JSON.stringify({model:c.cloudModel,messages,temperature:0.6}),signal:AbortSignal.timeout(120000)});
                if(!res.ok){ let m='HTTP '+res.status; try{const e=await res.json(); m=e.error?.message||m;}catch{} throw new Error(m); }
                const data=await res.json(); return data.choices?.[0]?.message?.content||'';
            }
        }

        /* ============ 输入 ============ */
        function getText(){ return document.getElementById('bookText').value.trim(); }
        function clearText(){ document.getElementById('bookText').value=''; }
        function importBook(){ document.getElementById('bookFile').click(); }
        function onBookFile(e){
            const f=e.target.files[0]; if(!f) return;
            const r=new FileReader(); r.onload=()=>{ document.getElementById('bookText').value=r.result; toast('已导入：'+f.name); }; r.readAsText(f);
        }
        function loadSample(){
            document.getElementById('bookText').value =
`暮色像被打翻的墨，顺着青石巷缓缓淌下来。林夜蹲在屋檐下，指尖凝着一点幽蓝的火——那是源能觉醒的征兆，也是他被整个宗族追杀的理由。

「你不该活着。」巷口传来苍老的声音，三长老手持枯灯，灯光所及之处，砖缝里钻出细密的荆棘。

林夜没有回头。他想起母亲临终前塞给他的那枚裂纹石：等你能听见星渊的低语，就去找沉默之海。

他握紧石子，幽蓝的火骤然暴涨。

「那便让他们记住，」少年第一次直视追杀者，「被追杀的人，也会反手点燃整片夜空。」`;
            toast('已填入示例片段');
        }

        /* ============ 本地速览（离线启发式） ============ */
        function runLocalStats(){
            const t=getText();
            if(!t){ toast('先贴入小说内容'); return; }
            const cjk=(t.match(/[一-龥]/g)||[]).length;
            const paras=t.split(/\n\s*\n/).filter(p=>p.trim()).length;
            const chapters=(t.match(/第[一二三四五六七八九十百千0-9]+章/g)||[]).length;
            const sentences=t.split(/[。！？!?…]/).filter(s=>s.trim()).length||1;
            const quotes=(t.match(/[“「『]/g)||[]).length;
            const dialogRatio=Math.min(100, Math.round(quotes/Math.max(1,sentences)*100));
            const avgLen=Math.round(cjk/Math.max(1,sentences));
            const cards=[
                {v:cjk, l:'中文字数'},
                {v:paras, l:'段落数'},
                {v:chapters||'—', l:'识别章节'},
                {v:avgLen, l:'平均句长(字)'},
                {v:quotes, l:'对话处'},
                {v:dialogRatio+'%', l:'对话占比'}
            ];
            document.getElementById('localStats').innerHTML=cards.map(c=>`<div class="stat-card"><div class="stat-value">${c.v}</div><div class="stat-label">${c.l}</div></div>`).join('');
            document.getElementById('localPanel').style.display='block';
            document.getElementById('localPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
        }

        /* ============ AI 深度拆书 ============ */
        const SYS_PROMPT = `你是一位资深文学编辑与写作教练。用户会贴入一段或整篇优质小说文本。请做"拆书"分析，帮助作者借鉴其写法。
请用中文输出，严格按以下四级标题结构（不要输出标题以外的寒暄）：

# 一、内容总结
用 2-4 句话概括核心故事、主题与基调。

# 二、结构拆解
用"起·承·转·合"或"三幕"分析叙事结构，指出关键转折点与整体节奏。

# 三、可借鉴技巧
分点说明，每点给出原文片段与可学习的手法：
- 人物塑造
- 悬念设置
- 节奏把控
- 金句摘录（摘抄 1-3 句原文中出彩的表达）

# 四、亮点与可优化
该作的突出优点；以及作者若借鉴时需要注意或避免的地方。`;

        async function aiDeconstruct(){
            const t=getText();
            if(!t){ toast('先贴入要拆解的小说'); return; }
            const btn=document.getElementById('aiBtn'); const st=document.getElementById('aiStatus');
            const panel=document.getElementById('aiPanel'); const out=document.getElementById('aiResult');
            btn.disabled=true; panel.style.display='block'; out.innerHTML='';
            document.getElementById('aiActions').style.display='none';
            st.innerHTML='<div class="note"><span class="spinner"></span>AI 正在拆解文本，请稍候…</div>';
            try{
                const slice=t.length>8000? t.slice(0,8000)+'\n…（已截断至前 8000 字）' : t;
                const text=await callSiteAI([{role:'system',content:SYS_PROMPT},{role:'user',content:slice}]);
                out.innerHTML=renderMD(text);
                st.innerHTML='<div class="note" style="color:var(--success)">✅ 拆书完成。仅供学习与借鉴，请尊重原作版权。</div>';
                document.getElementById('aiActions').style.display='flex';
                panel.scrollIntoView({behavior:'smooth',block:'start'});
            }catch(e){
                st.innerHTML='<div class="note" style="color:var(--error)">⚠️ '+esc(e.message)+'</div>';
            }finally{ btn.disabled=false; }
        }

        /* 轻量 Markdown 渲染（标题 / 列表 / 加粗） */
        function renderMD(md){
            const lines=(md||'').split('\n');
            let html=''; let inList=false;
            const closeList=()=>{ if(inList){ html+='</ul>'; inList=false; } };
            const inline=s=>esc(s)
                .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                .replace(/「(.+?)」/g,'<strong>「$1」</strong>');
            lines.forEach(line=>{
                const s=line.trim();
                if(!s){ closeList(); return; }
                if(s.startsWith('# ')){ closeList(); html+='<h2>'+inline(s.slice(2))+'</h2>'; }
                else if(s.startsWith('## ')){ closeList(); html+='<h3>'+inline(s.slice(3))+'</h3>'; }
                else if(s.startsWith('- ')||s.startsWith('· ')){ if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+inline(s.slice(2))+'</li>'; }
                else { closeList(); html+='<p>'+inline(s)+'</p>'; }
            });
            closeList();
            return html;
        }

        function copyResult(){
            const txt=document.getElementById('aiResult').innerText;
            if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(()=>toast('已复制拆书报告')); }
            else toast('复制失败，请手动选择');
        }
    </script>
</body>
</html>
