<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE BOOK - 大纲编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root[data-theme="dark"] {
            --bg-primary:#141413;--bg-secondary:#1c1c1a;--bg-tertiary:#2a2a28;--bg-hover:#333331;--bg-input:#1a1a19;--bg-card:#1c1c1a;--text-primary:#f0eee6;--text-secondary:#c8c6bd;--text-tertiary:#8b8a82;--text-muted:#5c5b55;--border:#3d3d3a;--accent:#d97757;--accent-hover:#e08a6e;--accent-light:#e08a6e;--accent-glow:rgba(217,119,87,0.3);--success:#5aab7a;--warning:#d4a853;--error:#e05555;
        }

        :root[data-theme="light"] {
            --bg-primary:#f7f5f0;--bg-secondary:#ffffff;--bg-tertiary:#efece6;--bg-hover:#e6e2da;--bg-input:#ffffff;--bg-card:#ffffff;--text-primary:#1c1b19;--text-secondary:#4a4843;--text-tertiary:#7a776f;--text-muted:#9a968c;--border:#d8d4cc;--accent:#c2410c;--accent-hover:#b85a3a;--accent-light:#d97757;--accent-glow:rgba(217,119,87,0.2);--success:#2f8f5b;--warning:#b07a1f;--error:#c0392b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Header */
        .header {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .nav-link.active {
            color: var(--accent-light);
            background: var(--bg-tertiary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .outline-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .tree-node {
            margin-bottom: 2px;
        }

        .tree-header {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: background 0.15s;
        }

        .tree-header:hover {
            background: var(--bg-hover);
        }

        .tree-header.active {
            background: var(--accent);
            color: white;
        }

        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: transform 0.2s;
        }

        .tree-toggle.expanded {
            transform: rotate(90deg);
        }

        .tree-icon {
            font-size: 16px;
        }

        .tree-name {
            flex: 1;
        }

        .tree-progress {
            font-size: 11px;
            color: var(--text-muted);
        }

        .tree-children {
            padding-left: 20px;
            display: none;
        }

        .tree-children.expanded {
            display: block;
        }

        /* 主内容 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            padding: 15px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--accent-light);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 编辑区 */
        .editor-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .outline-editor {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .editor-header {
            margin-bottom: 20px;
        }

        .editor-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            outline: none;
            border: none;
            background: transparent;
            color: var(--text-primary);
            width: 100%;
        }

        .editor-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .editor-content {
            min-height: 400px;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
            outline: none;
        }

        .editor-content:empty:before {
            content: '在这里编写大纲内容...';
            color: var(--text-muted);
        }

        /* 属性面板 */
        .properties-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 25px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .tag-input {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            min-height: 40px;
        }

        .tag {
            padding: 4px 8px;
            background: var(--accent);
            color: white;
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tag-remove {
            cursor: pointer;
            opacity: 0.7;
        }

        .tag-remove:hover {
            opacity: 1;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .checkbox-item:hover {
            background: var(--bg-hover);
        }

        .checkbox {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* 主题切换 */
        .theme-switcher {
            display: flex;
            gap: 8px;
            padding: 4px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .theme-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .theme-btn:hover {
            color: var(--text-primary);
        }

        .theme-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .toolbar {
                padding: 0 10px;
            }
            
            .toolbar-title {
                font-size: 14px;
            }
            
            .menu-bar {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .menu-item {
                padding: 0 10px;
            }
            
            .main-content,
            .content-area {
                padding: 10px;
            }
            
            /* 双栏堆叠：左侧导航浮层、属性面板移至下方满宽 */
            .main-container {
                flex-direction: column;
                height: auto;
            }
            
            .sidebar {
                position: fixed;
                left: -280px;
                width: 280px;
                height: 100%;
                z-index: 1000;
                transition: left 0.3s ease;
            }
            
            .sidebar.mobile-open {
                left: 0;
            }
            
            .properties-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border);
            }
            
            .content-area {
                min-height: 50vh;
            }
            
            .mobile-menu-btn {
                display: block !important;
            }
            
            .btn-group {
                flex-wrap: wrap;
            }
            
            .modal-content {
                width: 95%;
                padding: 15px;
            }
            
            .editor-pane {
                font-size: 16px;
            }
            
            .stats-bar {
                flex-wrap: wrap;
                gap: 5px;
            }
            
            .ai-panel {
                width: 100%;
                position: fixed;
                bottom: 0;
                right: 0;
                height: 50%;
            }
        }
        
        @media (max-width: 480px) {
            .toolbar-title {
                font-size: 12px;
            }
            
            .menu-bar {
                height: auto;
                flex-wrap: wrap;
            }
            
            .dropdown-menu {
                position: fixed;
                width: 100%;
                left: 0 !important;
            }
            
            .settings-group {
                padding: 15px;
            }
            
            .setting-item {
                padding: 10px;
            }
        }
        
        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .mobile-menu-btn:active {
            background: var(--accent);
        }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a class="logo-link" href="index.html"><div class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text">SAGEBOOK</span>
        </div></a>
        <nav class="nav">
            <a href="index.html" class="nav-link">🏠 首页</a>
            <a href="main-editor.html" class="nav-link">编辑器</a>
            <a href="character-management.html" class="nav-link">角色</a>
            <a href="template-gallery.html" class="nav-link">模板</a>
            <a href="outline-editor.html" class="nav-link active">大纲</a>
            <a href="knowledge-graph.html" class="nav-link">图谱</a>
            <a href="settings.html" class="nav-link">设置</a>
        </nav>
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="菜单">☰</button>
        <div class="header-actions">
            <div class="theme-switcher">
                <button class="theme-btn" onclick="setTheme('light')" id="themeLight">☀️</button>
                <button class="theme-btn active" onclick="setTheme('dark')" id="themeDark">🌙</button>
                <button class="theme-btn" onclick="setTheme('system')" id="themeSystem">💻</button>
            </div>
            <button class="btn" onclick="exportOutline()">📤 导出</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">大纲导航</div>
                <input type="text" class="search-input" placeholder="🔍 搜索大纲..." id="searchInput" oninput="searchOutline(this.value)">
            </div>
            <div class="outline-tree" id="outlineTree">
                <!-- 大纲树将通过 JS 动态生成 -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="toolbar">
                <button class="btn" onclick="addOutlineNode('volume')">+ 卷</button>
                <button class="btn btn-secondary" onclick="addOutlineNode('chapter')">+ 章节</button>
                <button class="btn btn-secondary" onclick="addOutlineNode('scene')">+ 场景</button>
                <div style="flex: 1;"></div>
                <div class="btn-group">
                    <button class="btn btn-secondary btn-sm" onclick="moveNode('up')">⬆️ 上移</button>
                    <button class="btn btn-secondary btn-sm" onclick="moveNode('down')">⬇️ 下移</button>
                    <button class="btn btn-secondary btn-sm" onclick="deleteNode()">🗑️ 删除</button>
                </div>
            </div>

            <div class="editor-area">
                <div class="outline-editor">
                    <div class="editor-header">
                        <input type="text" class="editor-title" id="outlineTitle" placeholder="大纲标题" oninput="updateOutline()">
                        <div class="editor-meta">
                            <span>类型: <strong id="outlineType">卷</strong></span>
                            <span>状态: <strong id="outlineStatus">进行中</strong></span>
                            <span>字数: <strong id="outlineWords">0</strong></span>
                        </div>
                    </div>
                    <div class="editor-content" id="outlineContent" contenteditable="true" oninput="updateOutline()"></div>
                </div>

                <div class="properties-panel">
                    <div class="panel-section">
                        <div class="panel-title">基本信息</div>
                        <div class="form-group">
                            <label class="form-label">节点类型</label>
                            <select class="form-input" id="propType" onchange="updateProperty('type', this.value)">
                                <option value="volume">卷</option>
                                <option value="chapter">章节</option>
                                <option value="scene">场景</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">状态</label>
                            <select class="form-input" id="propStatus" onchange="updateProperty('status', this.value)">
                                <option value="planning">规划中</option>
                                <option value="writing">写作中</option>
                                <option value="completed">已完成</option>
                                <option value="review">审核中</option>
                            </select>
                        </div>
                    </div>

                    <div class="panel-section">
                        <div class="panel-title">进度</div>
                        <div class="form-group">
                            <label class="form-label">完成度</label>
                            <input type="range" class="form-input" id="propProgress" min="0" max="100" value="0" onchange="updateProperty('progress', this.value)" style="padding: 0;">
                            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);">
                                <span>0%</span>
                                <span id="progressValue">0%</span>
                                <span>100%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="panel-section">
                        <div class="panel-title">目标字数</div>
                        <div class="form-group">
                            <label class="form-label">目标</label>
                            <input type="number" class="form-input" id="propTargetWords" placeholder="例如：3000" onchange="updateProperty('targetWords', this.value)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">当前字数</label>
                            <input type="number" class="form-input" id="propCurrentWords" placeholder="例如：1500" onchange="updateProperty('currentWords', this.value)">
                        </div>
                    </div>

                    <div class="panel-section">
                        <div class="panel-title">标签</div>
                        <div class="tag-input" id="tagInput">
                            <!-- 标签将通过 JS 动态生成 -->
                        </div>
                        <input type="text" class="form-input" id="newTag" placeholder="输入标签后回车" onkeypress="addTag(event)" style="margin-top: 8px;">
                    </div>

                    <div class="panel-section">
                        <div class="panel-title">待办事项</div>
                        <div id="todoList">
                            <!-- 待办事项将通过 JS 动态生成 -->
                        </div>
                        <input type="text" class="form-input" id="newTodo" placeholder="添加待办事项后回车" onkeypress="addTodo(event)" style="margin-top: 8px;">
                    </div>

                    <div class="panel-section">
                        <div class="panel-title">备注</div>
                        <textarea class="form-input form-textarea" id="propNotes" placeholder="添加备注..." onchange="updateProperty('notes', this.value)"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastMessage">操作成功</span>
    </div>

    <script>
        // ===== 数据定义 =====
        let outlineData = {
            title: '《系统觉醒》大纲',
            nodes: [
                {
                    id: 1,
                    title: '第一卷：觉醒篇',
                    type: 'volume',
                    status: 'writing',
                    progress: 60,
                    content: '主角张三意外觉醒神秘系统，开始非凡人生。\n\n核心情节：\n- 系统觉醒\n- 第一次任务\n- 认识女主\n- 遭遇敌人',
                    tags: ['主线', '开篇'],
                    todos: [
                        { text: '完善系统设定', done: true },
                        { text: '设计女主角色', done: false }
                    ],
                    notes: '注意节奏把控，不要太快暴露太多',
                    targetWords: 50000,
                    currentWords: 30000,
                    children: [
                        {
                            id: 11,
                            title: '第001章 觉醒',
                            type: 'chapter',
                            status: 'completed',
                            progress: 100,
                            content: '凌晨三点，张三盯着电脑屏幕发呆。系统意外激活...',
                            tags: ['关键章节'],
                            todos: [],
                            notes: '',
                            targetWords: 3000,
                            currentWords: 2345,
                            children: []
                        },
                        {
                            id: 12,
                            title: '第002章 初次任务',
                            type: 'chapter',
                            status: 'writing',
                            progress: 50,
                            content: '倒计时结束的那一刻，张三的世界彻底改变了...',
                            tags: ['任务'],
                            todos: [
                                { text: '添加更多对话', done: false }
                            ],
                            notes: '',
                            targetWords: 3000,
                            currentWords: 1500,
                            children: []
                        }
                    ]
                },
                {
                    id: 2,
                    title: '第二卷：成长篇',
                    type: 'volume',
                    status: 'planning',
                    progress: 0,
                    content: '主角开始接受更多任务，能力不断提升。',
                    tags: ['成长'],
                    todos: [],
                    notes: '',
                    targetWords: 80000,
                    currentWords: 0,
                    children: []
                }
            ]
        };

        let selectedNode = null;
        let nodeIdCounter = 100;

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            loadFromStorage();
            renderOutlineTree();
            if (outlineData.nodes.length > 0) {
                selectNode(outlineData.nodes[0]);
            }
            initTheme();
        });

        // ===== 主题 =====
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            setTheme(savedTheme);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('theme' + theme.charAt(0).toUpperCase() + theme.slice(1)).classList.add('active');
        }

        // ===== 渲染大纲树 =====
        function renderOutlineTree() {
            const tree = document.getElementById('outlineTree');
            tree.innerHTML = renderNodes(outlineData.nodes, 0);
        }

        function renderNodes(nodes, level) {
            const typeIcons = {
                volume: '📖',
                chapter: '📄',
                scene: '🎬'
            };

            return nodes.map(node => {
                const hasChildren = node.children && node.children.length > 0;
                const isActive = selectedNode && selectedNode.id === node.id;

                let html = `
                    <div class="tree-node">
                        <div class="tree-header ${isActive ? 'active' : ''}" onclick="selectNodeById(${node.id})">
                            ${hasChildren ? '<div class="tree-toggle" onclick="toggleTreeNode(event, ' + node.id + ')">▶</div>' : '<div style="width: 16px;"></div>'}
                            <span class="tree-icon">${typeIcons[node.type]}</span>
                            <span class="tree-name">${node.title}</span>
                            <span class="tree-progress">${node.progress}%</span>
                        </div>
                `;

                if (hasChildren) {
                    html += `<div class="tree-children" id="children-${node.id}">${renderNodes(node.children, level + 1)}</div>`;
                }

                html += '</div>';
                return html;
            }).join('');
        }

        function toggleTreeNode(event, nodeId) {
            event.stopPropagation();
            const toggle = event.target;
            const children = document.getElementById(`children-${nodeId}`);

            toggle.classList.toggle('expanded');
            children.classList.toggle('expanded');
        }

        function selectNodeById(id) {
            const node = findNode(outlineData.nodes, id);
            if (node) {
                selectNode(node);
            }
        }

        function selectNode(node) {
            selectedNode = node;
            renderOutlineTree();
            loadNodeToEditor(node);
        }

        function findNode(nodes, id) {
            for (let node of nodes) {
                if (node.id === id) return node;
                if (node.children) {
                    const found = findNode(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ===== 编辑器 =====
        function loadNodeToEditor(node) {
            document.getElementById('outlineTitle').value = node.title;
            document.getElementById('outlineContent').innerText = node.content || '';
            document.getElementById('propType').value = node.type;
            document.getElementById('propStatus').value = node.status;
            document.getElementById('propProgress').value = node.progress;
            document.getElementById('progressValue').textContent = node.progress + '%';
            document.getElementById('progressFill').style.width = node.progress + '%';
            document.getElementById('propTargetWords').value = node.targetWords || '';
            document.getElementById('propCurrentWords').value = node.currentWords || '';
            document.getElementById('propNotes').value = node.notes || '';

            // 更新元信息
            document.getElementById('outlineType').textContent = getTypeName(node.type);
            document.getElementById('outlineStatus').textContent = getStatusName(node.status);
            document.getElementById('outlineWords').textContent = node.currentWords || 0;

            // 渲染标签
            renderTags(node.tags || []);

            // 渲染待办事项
            renderTodos(node.todos || []);
        }

        function getTypeName(type) {
            const names = { volume: '卷', chapter: '章节', scene: '场景' };
            return names[type] || type;
        }

        function getStatusName(status) {
            const names = { planning: '规划中', writing: '写作中', completed: '已完成', review: '审核中' };
            return names[status] || status;
        }

        function updateOutline() {
            if (!selectedNode) return;

            selectedNode.title = document.getElementById('outlineTitle').value;
            selectedNode.content = document.getElementById('outlineContent').innerText;

            saveToStorage();
            renderOutlineTree();
        }

        function updateProperty(prop, value) {
            if (!selectedNode) return;

            selectedNode[prop] = prop === 'progress' || prop === 'targetWords' || prop === 'currentWords'
                ? parseInt(value) || 0
                : value;

            if (prop === 'progress') {
                document.getElementById('progressValue').textContent = value + '%';
                document.getElementById('progressFill').style.width = value + '%';
            }

            if (prop === 'type') {
                document.getElementById('outlineType').textContent = getTypeName(value);
            }

            if (prop === 'status') {
                document.getElementById('outlineStatus').textContent = getStatusName(value);
            }

            saveToStorage();
            renderOutlineTree();
        }

        // ===== 标签 =====
        function renderTags(tags) {
            const container = document.getElementById('tagInput');
            container.innerHTML = tags.map((tag, i) => `
                <div class="tag">
                    ${tag}
                    <span class="tag-remove" onclick="removeTag(${i})">×</span>
                </div>
            `).join('');
        }

        function addTag(event) {
            if (event.key !== 'Enter') return;

            const input = document.getElementById('newTag');
            const tag = input.value.trim();

            if (!tag || !selectedNode) return;

            if (!selectedNode.tags) selectedNode.tags = [];
            if (!selectedNode.tags.includes(tag)) {
                selectedNode.tags.push(tag);
                renderTags(selectedNode.tags);
                saveToStorage();
            }

            input.value = '';
        }

        function removeTag(index) {
            if (!selectedNode || !selectedNode.tags) return;

            selectedNode.tags.splice(index, 1);
            renderTags(selectedNode.tags);
            saveToStorage();
        }

        // ===== 待办事项 =====
        function renderTodos(todos) {
            const container = document.getElementById('todoList');
            container.innerHTML = todos.map((todo, i) => `
                <div class="checkbox-item" onclick="toggleTodo(${i})">
                    <div class="checkbox ${todo.done ? 'checked' : ''}">${todo.done ? '✓' : ''}</div>
                    <span style="${todo.done ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${todo.text}</span>
                </div>
            `).join('');
        }

        function addTodo(event) {
            if (event.key !== 'Enter') return;

            const input = document.getElementById('newTodo');
            const text = input.value.trim();

            if (!text || !selectedNode) return;

            if (!selectedNode.todos) selectedNode.todos = [];
            selectedNode.todos.push({ text: text, done: false });

            renderTodos(selectedNode.todos);
            saveToStorage();
            input.value = '';
        }

        function toggleTodo(index) {
            if (!selectedNode || !selectedNode.todos) return;

            selectedNode.todos[index].done = !selectedNode.todos[index].done;
            renderTodos(selectedNode.todos);
            saveToStorage();
        }

        // ===== 大纲操作 =====
        function addOutlineNode(type) {
            const newNode = {
                id: ++nodeIdCounter,
                title: `新${getTypeName(type)}`,
                type: type,
                status: 'planning',
                progress: 0,
                content: '',
                tags: [],
                todos: [],
                notes: '',
                targetWords: type === 'scene' ? 500 : type === 'chapter' ? 3000 : 50000,
                currentWords: 0,
                children: []
            };

            if (selectedNode && selectedNode.type !== 'scene') {
                if (!selectedNode.children) selectedNode.children = [];
                selectedNode.children.push(newNode);
            } else {
                outlineData.nodes.push(newNode);
            }

            saveToStorage();
            renderOutlineTree();
            selectNode(newNode);
            showToast('节点已添加');
        }

        function moveNode(direction) {
            if (!selectedNode) return;

            // 简化实现：在平级节点间移动
            const parent = findParent(outlineData.nodes, selectedNode.id);
            const siblings = parent ? parent.children : outlineData.nodes;
            const index = siblings.findIndex(n => n.id === selectedNode.id);

            if (direction === 'up' && index > 0) {
                [siblings[index], siblings[index - 1]] = [siblings[index - 1], siblings[index]];
            } else if (direction === 'down' && index < siblings.length - 1) {
                [siblings[index], siblings[index + 1]] = [siblings[index + 1], siblings[index]];
            }

            saveToStorage();
            renderOutlineTree();
        }

        function findParent(nodes, id, parent = null) {
            for (let node of nodes) {
                if (node.id === id) return parent;
                if (node.children) {
                    const found = findParent(node.children, id, node);
                    if (found !== null) return found;
                }
            }
            return null;
        }

        function deleteNode() {
            if (!selectedNode) return;

            if (!confirm(`确定要删除"${selectedNode.title}"吗？`)) return;

            function removeFromArray(nodes) {
                const index = nodes.findIndex(n => n.id === selectedNode.id);
                if (index !== -1) {
                    nodes.splice(index, 1);
                    return true;
                }
                for (let node of nodes) {
                    if (node.children && removeFromArray(node.children)) {
                        return true;
                    }
                }
                return false;
            }

            removeFromArray(outlineData.nodes);
            selectedNode = null;
            saveToStorage();
            renderOutlineTree();

            if (outlineData.nodes.length > 0) {
                selectNode(outlineData.nodes[0]);
            }

            showToast('节点已删除');
        }

        // ===== 搜索 =====
        function searchOutline(query) {
            const lowerQuery = query.toLowerCase();
            const items = document.querySelectorAll('.tree-header');

            items.forEach(item => {
                const name = item.querySelector('.tree-name').textContent.toLowerCase();
                item.parentElement.style.display = name.includes(lowerQuery) ? 'block' : 'none';
            });
        }

        // ===== 导出 =====
        function exportOutline() {
            const content = generateOutlineText(outlineData.nodes, 0);
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'outline.txt';
            a.click();
            URL.revokeObjectURL(url);
            showToast('大纲已导出');
        }

        function generateOutlineText(nodes, level) {
            const indent = '  '.repeat(level);
            return nodes.map(node => {
                let text = `${indent}${node.title} [${node.progress}%]\n`;
                if (node.content) {
                    text += `${indent}  ${node.content.replace(/\n/g, '\n' + indent + '  ')}\n`;
                }
                if (node.children && node.children.length > 0) {
                    text += generateOutlineText(node.children, level + 1);
                }
                return text;
            }).join('\n');
        }

        // ===== 存储 =====
        function saveToStorage() {
            localStorage.setItem('sagebook_outline', JSON.stringify(outlineData));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('sagebook_outline');
            if (saved) {
                try {
                    outlineData = JSON.parse(saved);
                } catch(e) {}
            }
        }

        // ===== 工具函数 =====
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleMobileSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                const sidebar = document.querySelector('.sidebar');
                const menuBtn = document.querySelector('.mobile-menu-btn');
                if (sidebar && sidebar.classList.contains('mobile-open') &&
                    !sidebar.contains(e.target) &&
                    menuBtn && !menuBtn.contains(e.target)) {
                    sidebar.classList.remove('mobile-open');
                }
            }
        });
    </script>
