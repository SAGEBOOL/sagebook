<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SAGE BOOK - AI 深度集成</title>
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        :root[data-theme="dark"] { --bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:#1e2a45;--bg-hover:#253352;--text-primary:#e0e0e0;--text-secondary:#a0a0b0;--accent:#7c5cbf;--accent-hover:#9b7fd4;--accent-glow:rgba(124,92,191,0.3);--border:#2a2a4a;--success:#4ade80;--warning:#fbbf24;--error:#f87171; }
        :root[data-theme="light"] { --bg-primary:#f5f0ff;--bg-secondary:#ffffff;--bg-card:#ffffff;--bg-hover:#f0e8ff;--text-primary:#1a1a2e;--text-secondary:#666680;--accent:#7c5cbf;--accent-hover:#6a4dac;--accent-glow:rgba(124,92,191,0.15);--border:#e0d8f0;--success:#22c55e;--warning:#f59e0b;--error:#ef4444; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh; }
        .container { max-width:1200px;margin:0 auto;padding:20px; }
        .header { text-align:center;padding:40px 20px 20px;position:relative; }
        .logo { font-size:36px;margin-bottom:8px; }
        .title { font-size:28px;font-weight:800;background:linear-gradient(135deg,#7c5cbf,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
        .subtitle { font-size:14px;color:var(--text-secondary);margin-top:6px; }
        .nav { display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap; }
        .nav-link { color:var(--text-secondary);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;transition:all .2s; }
        .nav-link:hover { color:var(--text-primary);background:var(--bg-hover); }
        .nav-link.active { color:var(--accent);background:var(--bg-card);border:1px solid var(--border); }
        .theme-switcher { position:fixed;top:15px;right:20px;display:flex;gap:4px;z-index:100; }
        .theme-btn { padding:6px 10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s; }
        .theme-btn:hover { border-color:var(--accent); }
        .theme-btn.active { background:var(--accent);color:white;border-color:var(--accent); }
        .tabs { display:flex;gap:8px;margin:20px 0;flex-wrap:wrap; }
        .tab-btn { padding:8px 20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:10px;cursor:pointer;font-size:14px;transition:all .2s; }
        .tab-btn:hover { border-color:var(--accent); }
        .tab-btn.active { background:var(--accent);color:white;border-color:var(--accent); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .ai-panel { background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:12px 0; }
        .panel-title { font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px; }
        .ai-input { width:100%;min-height:120px;padding:12px;background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;resize:vertical;font-family:inherit; }
        .ai-input:focus { outline:none;border-color:var(--accent); }
        .ai-output { background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px;min-height:80px;font-size:14px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto; }
        .ai-output.thinking { animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
        .model-selector { display:flex;gap:8px;margin:12px 0;flex-wrap:wrap; }
        .model-btn { padding:6px 14px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s; }
        .model-btn:hover { border-color:var(--accent); }
        .model-btn.active { background:var(--accent);color:white;border-color:var(--accent); }
        .btn { padding:8px 16px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s; }
        .btn:hover { border-color:var(--accent); }
        .btn-primary { background:var(--accent);color:white;border-color:var(--accent); }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn-group { display:flex;gap:8px;margin:16px 0;flex-wrap:wrap; }
        .footer { text-align:center;padding:30px 20px;font-size:13px;color:var(--text-secondary);border-top:1px solid var(--border);margin-top:40px; }
        .footer a { color:var(--accent);text-decoration:none; }
        .status-ok { color:var(--success);font-size:12px;margin-left:8px; }
        .status-no { color:var(--error);font-size:12px;margin-left:8px; }
        @media(max-width:768px) { .title { font-size:24px; } .nav { gap:10px; } .tab-btn { font-size:13px;padding:6px 14px; } }
    </style>
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn" onclick="setTheme('dark')">🌙</button>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
    </div>
    <div class="container">
        <div class="header">
            <div class="logo">🤖</div>
            <div class="title">AI 深度集成</div>
            <div class="subtitle">AI 辅助写作 · 设定管理 · 写作教练 · 三模型对比</div>
        </div>
        <div class="nav">
            <a class="nav-link" href="index.html">🏠 首页</a>
            <a class="nav-link" href="main-editor.html">📝 主编辑器</a>
            <a class="nav-link" href="settings.html">⚙️ 设置</a>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('continue')">✍️ AI 续写</button>
            <button class="tab-btn" onclick="switchTab('polish')">💅 AI 润色</button>
            <button class="tab-btn" onclick="switchTab('coach')">🎯 写作教练</button>
            <button class="tab-btn" onclick="switchTab('compare')">🔬 三模型对比</button>
        </div>
        <!-- AI 续写 -->
        <div id="tab-continue" class="tab-content active">
            <div class="ai-panel">
                <div class="panel-title">✍️ AI 辅助续写</div>
                <textarea class="ai-input" id="continueInput" placeholder="粘贴你的文本，AI 会基于上下文续写...">李明深吸一口气，剑尖微微颤抖。他能感受到前方那股来自远古的压迫感——那不是普通魔兽的气息，而是某种更为古老的存在。</textarea>
                <div class="model-selector" id="continueModels"></div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="aiContinue()">🚀 开始续写</button>
                    <button class="btn" onclick="clearInput('continueInput')">清空</button>
                </div>
            </div>
            <div class="ai-output" id="aiOutput">等待 AI 生成...</div>
        </div>
        <!-- AI 润色 -->
        <div id="tab-polish" class="tab-content">
            <div class="ai-panel">
                <div class="panel-title">💅 AI 润色</div>
                <textarea class="ai-input" id="polishInput" placeholder="粘贴需要润色的文本...">天色慢慢暗了下来，他走在大路上，心里想着很多事情。风很大，吹得衣服猎猎作响。周围没有别人，只有他一个人走。</textarea>
                <select class="ai-input" id="polishStyle" style="min-height:auto;padding:8px 12px;">
                    <option value="refine">改进文笔</option>
                    <option value="vivid">生动形象</option>
                    <option value="classical">文雅古典</option>
                    <option value="simple">通俗易懂</option>
                </select>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="aiPolish()">🚀 开始润色</button>
                </div>
            </div>
            <div class="ai-output" id="polishOutput">等待 AI 生成...</div>
        </div>
        <!-- 写作教练 -->
        <div id="tab-coach" class="tab-content">
            <div class="ai-panel">
                <div class="panel-title">🎯 写作教练</div>
                <textarea class="ai-input" id="coachInput" placeholder="粘贴一段你的章节文本，AI 会分析节奏、人物塑造、场景描写等..." style="min-height:150px;"></textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="aiCoach()">🚀 开始分析</button>
                </div>
            </div>
            <div class="ai-output" id="coachOutput">等待 AI 生成...</div>
        </div>
        <!-- 三模型对比 -->
        <div id="tab-compare" class="tab-content">
            <div class="ai-panel">
                <div class="panel-title">🔬 三模型对比写作</div>
                <textarea class="ai-input" id="compareInput" placeholder="输入场景描述，三个模型会分别生成不同版本..." style="min-height:100px;">黎明初现，天启城在晨光中缓缓苏醒。远处的钟楼传来悠远的钟声，城墙上巡逻的士兵开始一天的工作。街道上的早点摊冒着热气，行人匆匆...</textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="runCompare()">🚀 三模型生成</button>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;">
                <div class="ai-output" id="compare1">等待生成...</div>
                <div class="ai-output" id="compare2">等待生成...</div>
                <div class="ai-output" id="compare3">等待生成...</div>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn" onclick="exportAI()">📤 导出 AI 结果</button>
            <button class="btn" onclick="resetAll()">🔄 重置</button>
        </div>
        <div class="footer">
            <p>SAGE BOOK v1.5 | Created by DSArt-Design | 2026-06</p>
            <p style="margin-top:6px">Powered by Ollama · OpenAI · Claude · Qwen</p>
        </div>
    </div>
    <script>
        // 主题切换
        function setTheme(t){const h=document.documentElement,b=document.querySelectorAll('.theme-btn');
        if(t==='system'){const d=window.matchMedia('(prefers-color-scheme:dark)').matches;h.setAttribute('data-theme',d?'dark':'light')}
        else h.setAttribute('data-theme',t);b.forEach(x=>x.classList.remove('active'));
        document.querySelector(`.theme-btn[onclick="setTheme('${t}')"]`).classList.add('active');
        localStorage.setItem('theme',t)}
        const st=localStorage.getItem('theme')||'dark';setTheme(st);

        // Tab 切换
        function switchTab(id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active')}

        // Ollama API 地址
        const OLLAMA_BASE = 'http://localhost:11434';

        // 获取选中的模型
        function getSelectedModel(){
            const active = document.querySelector('.model-btn.active');
            return active ? active.dataset.model : null;
        }

        // 自动检测 Ollama 模型列表
        async function loadOllamaModels(){
            const container = document.getElementById('continueModels');
            container.innerHTML = '🔍 加载模型中...';
            try {
                const res = await fetch(OLLAMA_BASE + '/api/tags');
                const data = await res.json();
                if(data.models && data.models.length > 0){
                    container.innerHTML = '';
                    container.innerHTML = '<span style="font-size:12px;color:var(--text-secondary);margin-right:8px;">选择模型：</span>';
                    data.models.forEach(m => {
                        const btn = document.createElement('button');
                        btn.className = 'model-btn' + (m.name === localStorage.getItem('localModel') ? ' active' : '');
                        btn.dataset.model = m.name;
                        btn.textContent = m.name.split(':')[0];
                        btn.onclick = function(){
                            document.querySelectorAll('.model-btn').forEach(b=>b.classList.remove('active'));
                            this.classList.add('active');
                            localStorage.setItem('localModel', this.dataset.model);
                        };
                        container.appendChild(btn);
                    });
                    if(!document.querySelector('.model-btn.active')){
                        container.firstElementChild.classList.add('active');
                    }
                } else {
                    container.innerHTML = '❌ 未找到模型';
                }
            } catch(e){
                container.innerHTML = '❌ 无法连接 Ollama — 请确保 http://localhost:11434 运行';
                console.warn('Ollama 未连接:', e);
            }
        }

        // 加载保存的模型选择
        (function(){
            const saved = localStorage.getItem('localModel');
            if(saved){
                const btns = document.querySelectorAll('.model-btn');
                btns.forEach(b => { if(b.dataset.model === saved) b.classList.add('active'); });
            }
            if(btns.length === 0){
                // 默认选择第一个
                const first = container.firstElementChild;
                if(first) first.classList.add('active');
            }
        })();

        // 调用 Ollama API
        async function callOllama(prompt, model){
            const res = await fetch(OLLAMA_BASE + '/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ model: model, prompt: prompt, stream: false, options: { temperature: 0.7, top_p: 0.9 } })
            });
            if(!res.ok) throw new Error('Ollama API error: ' + res.status);
            const data = await res.json();
            return data.response;
        }

        // 构建 AI 续写 prompt
        function buildContinuePrompt(text){
            return `你是一位专业的中文小说作家。请基于以下文本，续写300-500字的后续内容。要求：
1. 保持原有的文风和视角
2. 情节要有张力，人物有深度
3. 不要重复已有内容
4. 续写完后，用 --- 分隔，说明续写思路

原文：
${text}

续写：`;
        }

        // AI 续写
        async function aiContinue(){
            const input = document.getElementById('continueInput').value.trim();
            if(!input){alert('请先输入或粘贴文本');return;}
            const model = getSelectedModel();
            if(!model){alert('请先选择 AI 模型（到"设置"页面配置并保存）');return;}
            const output = document.getElementById('aiOutput');
            output.className = 'ai-output thinking';
            output.textContent = '⏳ AI 正在思考并生成中...（可能需要30秒）';
            try {
                const prompt = buildContinuePrompt(input);
                const result = await callOllama(prompt, model);
                output.className = 'ai-output';
                output.textContent = result;
            } catch(e){
                output.className = 'ai-output';
                output.textContent = '❌ AI 调用失败: ' + e.message + '\n\n请检查：\n1. Ollama 是否启动\n2. 模型是否已配置\n3. 是否通过 http://localhost:8000 访问';
            }
        }

        // AI 润色
        async function aiPolish(){
            const input = document.getElementById('polishInput').value.trim();
            if(!input){alert('请先输入需要润色的文本');return;}
            const model = getSelectedModel();
            if(!model){alert('请先选择 AI 模型');return;}
            const style = document.getElementById('polishStyle').value;
            const styleMap = {refine:'改进文笔，使语言更优美流畅',vivid:'使描写更生动形象，增强画面感',classical:'使用典雅的文雅词句',simple:'通俗易懂，去除生僻词汇'};
            const output = document.getElementById('polishOutput');
            output.className = 'ai-output thinking';
            output.textContent = '⏳ AI 正在润色中...';
            try {
                const prompt = `你是一位专业的中文小说润色师。请润色以下文本，要求：${styleMap[style]}。
请输出润色后的完整版本，不要解释。

原文：
${input}

润色后：`;
                const result = await callOllama(prompt, model);
                output.className = 'ai-output';
                output.textContent = result;
            } catch(e){
                output.className = 'ai-output';
                output.textContent = '❌ AI 调用失败: ' + e.message;
            }
        }

        // AI 写作教练
        async function aiCoach(){
            const input = document.getElementById('coachInput').value.trim();
            if(!input){alert('请先输入章节文本');return;}
            const model = getSelectedModel();
            if(!model){alert('请先选择 AI 模型');return;}
            const output = document.getElementById('coachOutput');
            output.className = 'ai-output thinking';
            output.textContent = '⏳ AI 正在分析中...';
            try {
                const prompt = `你是一位专业的写作教练和文学评论家。请对以下章节文本进行详细分析，包括：
1. **节奏分析**：开头/发展/高潮/结尾是否合理
2. **人物塑造**：对话和动作是否生动
3. **场景描写**：画面感如何
4. **改进建议**：具体可操作的建议
5. **综合评分**：1-10分

请客观评价，既指出优点也指出不足。

章节文本：
${input}

分析：`;
                const result = await callOllama(prompt, model);
                output.className = 'ai-output';
                output.textContent = result;
            } catch(e){
                output.className = 'ai-output';
                output.textContent = '❌ AI 调用失败: ' + e.message;
            }
        }

        // 三模型对比
        async function runCompare(){
            const input = document.getElementById('compareInput').value.trim();
            if(!input){alert('请先输入场景描述');return;}
            const model = getSelectedModel();
            if(!model){alert('请先选择 AI 模型');return;}
            const prompts = [
                `用细腻的笔触描写以下场景，注重细节和氛围：${input}`,
                `用紧张刺激的节奏描写以下场景，注重动作和冲突：${input}`,
                `用诗意优美的语言描写以下场景，注重意境和修辞：${input}`
            ];
            const outputs = [document.getElementById('compare1'),document.getElementById('compare2'),document.getElementById('compare3')];
            outputs.forEach(o => { o.className='ai-output thinking'; o.textContent='⏳ 生成中...'; });
            try {
                const promises = prompts.map(p => callOllama(p, model));
                const results = await Promise.all(promises);
                outputs.forEach((o,i) => { o.className='ai-output'; o.textContent=results[i]; });
            } catch(e){
                outputs.forEach(o => { o.className='ai-output'; o.textContent='❌ AI 调用失败: ' + e.message; });
            }
        }

        // 工具函数
        function clearInput(id){document.getElementById(id).value='';}
        function resetAll(){
            ['aiOutput','polishOutput','coachOutput','compare1','compare2','compare3'].forEach(id=>{
                document.getElementById(id).textContent='等待 AI 生成...';
                document.getElementById(id).className='ai-output';
            });
        }
        function exportAI(){
            const text = document.getElementById('aiOutput').textContent;
            if(text==='等待 AI 生成...'){alert('没有可导出的内容');return;}
            const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ai-续写结果.txt';
            a.click();
        }

        // 初始化
        loadOllamaModels();
    </script>
</body>
</html>
