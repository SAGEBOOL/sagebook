<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>写作技能 - SAGE BOOK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg-primary:#141413;--bg-secondary:#1c1c1a;--bg-tertiary:#2a2a28;--bg-hover:#333331;--bg-input:#1a1a19;--bg-card:#1c1c1a;--text-primary:#f0eee6;--text-secondary:#c8c6bd;--text-tertiary:#8b8a82;--text-muted:#5c5b55;--border:#3d3d3a;--accent:#d97757;--accent-hover:#e08a6e;--accent-light:#e08a6e;--accent-glow:rgba(217,119,87,0.3);--success:#5aab7a;--warning:#d4a853;--error:#e05555;
        }

        :root[data-theme="light"] {
            --bg-primary:#f7f5f0;--bg-secondary:#ffffff;--bg-tertiary:#efece6;--bg-hover:#e6e2da;--bg-input:#ffffff;--bg-card:#ffffff;--text-primary:#1c1b19;--text-secondary:#4a4843;--text-tertiary:#7a776f;--text-muted:#9a968c;--border:#d8d4cc;--accent:#c2410c;--accent-hover:#b85a3a;--accent-light:#d97757;--accent-glow:rgba(217,119,87,0.2);--success:#2f8f5b;--warning:#b07a1f;--error:#c0392b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* 顶部栏 */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .topbar-left { display: flex; align-items: center; gap: 14px; }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .back-link:hover { border-color: var(--accent); color: var(--accent); }

        .page-title { font-size: 24px; font-weight: 800; }

        .ai-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
        }
        .ai-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warning); }
        .ai-dot.ok { background: var(--success); }

        /* 布局 */
        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        .card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 14px;
            font-size: 15px;
            line-height: 1.7;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 技能网格 */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 4px;
        }

        .skill-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .skill-btn:hover:not(:disabled) {
            border-color: var(--accent);
            box-shadow: 0 6px 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        .skill-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .skill-btn .ico { font-size: 22px; }
        .skill-btn .nm { font-weight: 700; font-size: 14px; }
        .skill-btn .ds { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }

        /* 输出区 */
        #output {
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 220px;
        }

        .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

        .btn {
            padding: 9px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn.primary:hover { background: var(--accent-hover); color: #fff; }

        .hint {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-top: 12px;
            padding: 12px 14px;
            background: var(--bg-primary);
            border-radius: 10px;
            border: 1px dashed var(--border);
        }
        .hint a { color: var(--accent); }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--accent);
            color: var(--text-primary);
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="topbar-left">
                <a class="sb-brand" href="index.html"><span class="sb-brand-ico">📚</span><span>SAGEBOOK</span></a>
                <div class="page-title">✍️ 写作技能</div>
            </div>
            <div class="ai-status">
                <span class="ai-dot" id="aiDot"></span>
                <span id="aiStatusText">检测中…</span>
            </div>
        </div>

        <div class="layout">
            <!-- 左：输入 + 技能 -->
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="card">
                    <h2>📥 输入文本</h2>
                    <textarea id="inputText" placeholder="在此粘贴或输入你的小说文本 / 片段 / 设定草稿……&#10;选好下方技能后点击，AI 会基于这段内容为你处理。"></textarea>
                    <div class="meta-row">
                        <span id="charCount">0 字</span>
                        <button class="btn" onclick="document.getElementById('inputText').value='';updateCount()">清空</button>
                    </div>
                </div>

                <div class="card">
                    <h2>🧰 技能库</h2>
                    <div class="skill-grid" id="skillGrid"></div>
                    <div class="hint" id="cfgHint"></div>
                </div>
            </div>

            <!-- 右：输出 -->
            <div class="card">
                <h2>📤 AI 结果</h2>
                <textarea id="output" readonly placeholder="选择左侧技能并点击，结果将显示在这里……"></textarea>
                <div class="btn-row">
                    <button class="btn primary" id="copyBtn" onclick="copyResult()">📋 复制结果</button>
                    <button class="btn" id="downloadBtn" onclick="downloadResult()">💾 下载 .txt</button>
                    <button class="btn" onclick="document.getElementById('output').value=''">🗑️ 清空</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>SAGE BOOK v1.5 | 写作技能模块 | 基于本地 Ollama / 云端 API 真实调用，无模拟</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== 主题（与全站一致）=====
        function switchTheme(theme) {
            const html = document.documentElement;
            if (theme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                html.setAttribute('data-theme', theme);
            }
            localStorage.setItem('theme', theme);
        }
        switchTheme(localStorage.getItem('theme') || 'dark');

        // ===== 技能定义 =====
        const SKILLS = [
            { id:'deslop', icon:'🧹', name:'去AI味', desc:'消除机器感，更自然',
              prompt: t => `你是一位资深中文网文编辑，擅长消除AI生成文本的机械味。请改写以下文本，去除模板化表达、过度对仗、空洞升华和生硬过渡，让文字更自然、有个人风格、像人类手写。保持原意、情节与人设不变：\n\n${t}` },
            { id:'polish', icon:'✨', name:'润色', desc:'文学性打磨流畅度',
              prompt: t => `你是一位文学编辑。请润色以下文字，使其更加优美流畅、节奏更好，保持原意与人物语气不变：\n\n${t}` },
            { id:'expand', icon:'🔍', name:'扩写', desc:'增加细节与氛围',
              prompt: t => `请将以下内容扩写为原来的 1.5–2 倍篇幅，增加感官细节、心理描写、环境烘托，但不要水字数、不要偏离情节：\n\n${t}` },
            { id:'continue', icon:'➡️', name:'续写', desc:'顺承文风往下写',
              prompt: t => `你是一位资深小说作家。请根据以下内容续写 200–300 字，保持文风、视角与节奏一致，自然推进情节：\n\n${t}` },
            { id:'outline', icon:'📋', name:'大纲生成', desc:'从片段提炼大纲',
              prompt: t => `请基于以下小说内容，生成一份结构清晰的章节大纲（含卷/章节标题与每章 1–2 句要点），并指出可展开的支线：\n\n${t}` },
            { id:'conflict', icon:'⚔️', name:'矛盾冲突', desc:'挖掘张力与冲突',
              prompt: t => `请分析以下文本中已有的矛盾冲突，并指出 3–5 个可以加强戏剧张力、制造新冲突或反转的切入点，给出具体写法建议：\n\n${t}` },
            { id:'worldbuild', icon:'🌍', name:'设定生成', desc:'由片段生成世界观',
              prompt: t => `请基于以下小说片段，反向推导并补全世界观设定：含地理/势力/力量体系/社会规则/关键历史，保持与原文不矛盾，输出条目化设定条目：\n\n${t}` },
            { id:'dialogue', icon:'💬', name:'对话生成', desc:'写自然有冲突的对白',
              prompt: t => `请根据以下情境/片段创作一段对话，要求自然、有潜台词、含观点冲突、能推动情节或揭示人物关系（2–4 人）：\n\n${t}` },
            { id:'brainstorm', icon:'💡', name:'情节脑暴', desc:'提供发展方向',
              prompt: t => `基于以下文本，提供 5 个可行的情节发展方向或爽点设计，分别说明看点、风险和适用节奏：\n\n${t}` },
            { id:'character', icon:'👤', name:'人物小传', desc:'生成角色档案',
              prompt: t => `请根据以下片段，提炼并补全一个角色档案：姓名、身份、性格、欲望与恐惧、核心矛盾、口头禅、成长弧光，保持与原文一致：\n\n${t}` },
            { id:'analyze', icon:'📊', name:'章节点评', desc:'风格与优缺点分析',
              prompt: t => `请从写作风格、节奏、人物、悬念四个维度点评以下文本，指出亮点与可改进处，并给出 3 条具体修改建议：\n\n${t}` },
            { id:'quotes', icon:'🌟', name:'金句提炼', desc:'提炼/创作金句',
              prompt: t => `请从以下文本中提炼最具感染力的 3–5 句金句；若原文缺少，请基于其主题创作同等数量的金句，并注明适用场景：\n\n${t}` }
        ];

        // ===== 渲染技能按钮 =====
        const grid = document.getElementById('skillGrid');
        SKILLS.forEach(s => {
            const b = document.createElement('button');
            b.className = 'skill-btn';
            b.innerHTML = `<span class="ico">${s.icon}</span><span class="nm">${s.name}</span><span class="ds">${s.desc}</span>`;
            b.onclick = () => runSkill(s);
            grid.appendChild(b);
        });

        // ===== 字数统计 =====
        const inputEl = document.getElementById('inputText');
        function updateCount() {
            document.getElementById('charCount').textContent = (inputEl.value.trim().length) + ' 字';
        }
        inputEl.addEventListener('input', updateCount);

        // ===== AI 调用（复用全站配置：本地 Ollama / 云端 API）=====
        function getAIConfig() {
            const useLocal = localStorage.getItem('useLocalAI') === 'true';
            const localModel = localStorage.getItem('localModel');
            const cloudModel = localStorage.getItem('cloudModel');
            const apiKey = localStorage.getItem('cloudApiKey');
            const ollamaBase = localStorage.getItem('ollamaEndpoint') || 'http://localhost:11434';
            const cloudBaseUrl = localStorage.getItem('cloudBaseUrl') || 'https://api.openai.com/v1';
            return { useLocal, localModel, cloudModel, apiKey, ollamaBase, cloudBaseUrl };
        }

        async function callLocalAI(prompt, model, baseurl) {
            const response = await fetch(`${baseurl || 'http://localhost:11434'}/api/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: model,
                    prompt: prompt,
                    stream: false,
                    options: { temperature: 0.8, top_p: 0.9 }
                })
            });
            if (!response.ok) throw new Error('Ollama API error ' + response.status);
            const data = await response.json();
            return data.response;
        }

        async function callCloudAI(prompt, model, apiKey, baseUrl) {
            // 通用 OpenAI 兼容调用：POST {baseUrl}/chat/completions
            let base = (baseUrl || 'https://api.openai.com/v1').replace(/\/+$/, '');
            const endpoint = base.endsWith('/chat/completions') ? base : base + '/chat/completions';
            const requestBody = {
                model: model || 'gpt-4o',
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.8
            };
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || ('API error ' + response.status));
            }
            const data = await response.json();
            if (data.choices) return data.choices[0].message.content;
            if (data.output) return data.output.text;
            return JSON.stringify(data);
        }

        async function runSkill(skill) {
            const text = inputEl.value.trim();
            if (!text) { showToast('⚠️ 请先在左侧输入文本', 'warning'); return; }

            const cfg = getAIConfig();
            const out = document.getElementById('output');
            out.value = '🤔 ' + skill.name + ' 思考中…';
            setButtons(false);

            try {
                const prompt = skill.prompt(text);
                let result = '';
                if (cfg.useLocal && cfg.localModel) {
                    result = await callLocalAI(prompt, cfg.localModel, cfg.ollamaBase);
                } else if (cfg.apiKey && cfg.cloudModel) {
                    result = await callCloudAI(prompt, cfg.cloudModel, cfg.apiKey, cfg.cloudBaseUrl);
                } else {
                    result = '⚠️ 尚未配置 AI 模型。\n\n请打开「设置」页面，配置本地 Ollama（运行 ollama serve）或填写云端 API Key 后重试。';
                    showToast('⚠️ 未配置 AI，请先到设置页配置模型', 'warning');
                }
                out.value = result;
            } catch (e) {
                out.value = '❌ AI 调用失败: ' + e.message + '\n\n请检查：\n1. 本地 Ollama 是否运行\n2. API Key 是否正确\n3. 网络是否畅通';
                showToast('❌ 调用失败：' + e.message, 'danger');
            } finally {
                setButtons(true);
            }
        }

        function setButtons(enabled) {
            document.querySelectorAll('.skill-btn').forEach(b => b.disabled = !enabled);
        }

        // ===== 复制 / 下载 =====
        function copyResult() {
            const v = document.getElementById('output').value;
            if (!v) return;
            navigator.clipboard.writeText(v).then(
                () => showToast('✅ 已复制', 'success'),
                () => showToast('复制失败，请手动选择', 'warning')
            );
        }
        function downloadResult() {
            const v = document.getElementById('output').value;
            if (!v) return;
            const blob = new Blob([v], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sagebook-写作技能结果.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // ===== Toast =====
        let toastTimer;
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderColor = type === 'danger' ? 'var(--danger)' : type === 'warning' ? 'var(--warning)' : 'var(--accent)';
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
        }

        // ===== AI 状态检测 =====
        function checkAIStatus() {
            const cfg = getAIConfig();
            const dot = document.getElementById('aiDot');
            const txt = document.getElementById('aiStatusText');
            const hint = document.getElementById('cfgHint');
            if (cfg.useLocal && cfg.localModel) {
                dot.classList.add('ok');
                txt.textContent = '本地 · ' + cfg.localModel;
                hint.innerHTML = '当前使用本地 Ollama 模型 <b>' + cfg.localModel + '</b>（' + cfg.ollamaBase + '）。如需更换，请前往 <a href="settings.html">设置</a>。';
            } else if (cfg.apiKey && cfg.cloudModel) {
                dot.classList.add('ok');
                txt.textContent = '云端 · ' + cfg.cloudModel;
                hint.innerHTML = '当前使用云端 API 模型 <b>' + cfg.cloudModel + '</b>。如需更换，请前往 <a href="settings.html">设置</a>。';
            } else {
                dot.classList.remove('ok');
                txt.textContent = '未配置 AI';
                hint.innerHTML = '⚠️ 尚未检测到 AI 配置。请先到 <a href="settings.html">设置页面</a> 配置本地 Ollama 或云端 API Key，否则技能按钮无法工作。';
            }
        }
        checkAIStatus();
    </script>
</body>
</html>
