<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SAGE BOOK - 世界观管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root[data-theme="dark"] {
            --bg-primary:#141413;--bg-secondary:#1c1c1a;--bg-tertiary:#2a2a28;--bg-hover:#333331;--bg-input:#1a1a19;--bg-card:#1c1c1a;--text-primary:#f0eee6;--text-secondary:#c8c6bd;--text-tertiary:#8b8a82;--text-muted:#5c5b55;--border:#3d3d3a;--accent:#d97757;--accent-hover:#e08a6e;--accent-light:#e08a6e;--accent-glow:rgba(217,119,87,0.3);--success:#5aab7a;--warning:#d4a853;--error:#e05555;
        }
        :root[data-theme="light"] {
            --bg-primary:#f7f5f0;--bg-secondary:#ffffff;--bg-tertiary:#efece6;--bg-hover:#e6e2da;--bg-input:#ffffff;--bg-card:#ffffff;--text-primary:#1c1b19;--text-secondary:#4a4843;--text-tertiary:#7a776f;--text-muted:#9a968c;--border:#d8d4cc;--accent:#c2410c;--accent-hover:#b85a3a;--accent-light:#d97757;--accent-glow:rgba(217,119,87,0.2);--success:#2f8f5b;--warning:#b07a1f;--error:#c0392b;
        }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh; }
        .container { max-width:1200px;margin:0 auto;padding:20px; }
        .header { text-align:center;padding:40px 20px 20px;position:relative; }
        .logo { font-size:36px;margin-bottom:8px; }
        .title { font-size:28px;font-weight:800;color:var(--accent); }
        .subtitle { font-size:14px;color:var(--text-secondary);margin-top:6px; }
        .nav { display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap; }
        .nav-link { color:var(--text-secondary);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;transition:all .2s; }
        .nav-link:hover { color:var(--text-primary);background:var(--bg-hover); }
        .nav-link.active { color:var(--accent);background:var(--bg-card);border:1px solid var(--border); }
        .theme-switcher { position:fixed;top:15px;right:20px;display:flex;gap:4px;z-index:100; }
        .theme-btn { padding:6px 10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s; }
        .theme-btn:hover { border-color:var(--accent); }
        .theme-btn.active { background:var(--accent);color:white;border-color:var(--accent); }
        .mobile-menu-btn { display:none;position:fixed;top:15px;left:15px;z-index:100;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:18px;cursor:pointer; }
        .tabs { display:flex;gap:8px;margin:20px 0;flex-wrap:wrap; }
        .tab-btn { padding:8px 20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:10px;cursor:pointer;font-size:14px;transition:all .2s; }
        .tab-btn:hover { border-color:var(--accent); }
        .tab-btn.active { background:var(--accent);color:white;border-color:var(--accent); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
        .grid-3 { display:grid;grid-template-columns:repeat(3,1fr);gap:16px; }
        .card { background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:12px 0; }
        .card-title { font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px; }
        .stat-row { display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border); }
        .stat-row:last-child { border-bottom:none; }
        .stat-label { color:var(--text-secondary);font-size:13px; }
        .stat-val { font-weight:600;font-size:14px; }
        .timeline { position:relative;padding-left:24px; }
        .timeline::before { content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border); }
        .tl-item { position:relative;margin:12px 0;background:var(--bg-hover);border-radius:8px;padding:12px; }
        .tl-item::before { content:'';position:absolute;left:-20px;top:18px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-primary); }
        .tl-item.conflict::before { background:var(--error); }
        .tl-item.resolved::before { background:var(--success); }
        .tl-date { font-size:12px;color:var(--text-secondary); }
        .tl-content { font-size:14px;margin-top:4px; }
        .map-grid { display:grid;grid-template-columns:repeat(10,1fr);gap:3px;padding:10px;background:var(--bg-hover);border-radius:12px; }
        .map-cell { aspect-ratio:1;border-radius:4px;cursor:pointer;transition:transform .1s; }
        .map-cell:hover { transform:scale(1.12);z-index:1; }
        .map-cell.city { background:var(--accent); }
        .map-cell.forest { background:#22c55e; }
        .map-cell.mountain { background:#8b8b8b; }
        .map-cell.water { background:#3b82f6; }
        .map-cell.dungeon { background:#f87171; }
        .map-cell.empty { background:var(--bg-primary);border:1px solid var(--border); }
        .terrain-picker { display:flex;gap:8px;flex-wrap:wrap;margin:10px 0; }
        .terrain-opt { display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:20px; }
        .terrain-opt.active { border-color:var(--accent);background:var(--accent-glow); }
        .swatch { width:14px;height:14px;border-radius:3px; }
        .faction-list { display:flex;flex-direction:column;gap:10px; }
        .faction-item { display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg-hover);border-radius:8px; }
        .faction-icon { font-size:22px; }
        .faction-info { flex:1; }
        .faction-name { font-size:14px;font-weight:600; }
        .faction-desc { font-size:12px;color:var(--text-secondary);margin-top:2px; }
        .power-level { font-size:12px;padding:2px 8px;border-radius:10px;background:var(--accent);color:white; }
        .rule-item { display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg-hover);border-radius:8px;margin:6px 0; }
        .rule-status { width:10px;height:10px;border-radius:50%;flex:none; }
        .rule-status.pass { background:var(--success); }
        .rule-status.fail { background:var(--error); }
        .rule-status.warn { background:var(--warning); }
        .rule-text { flex:1;font-size:14px; }
        .encyclopedia-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px; }
        .encyclopedia-item { background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;padding:14px; }
        .encyclopedia-title { font-size:14px;font-weight:600;margin-bottom:6px; }
        .encyclopedia-preview { font-size:12px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap; }
        .encyclopedia-meta { display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text-secondary); }
        .row { display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0; }
        .row input, .row select, .row textarea { background:var(--bg-hover);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);padding:8px 10px;font-size:13px;font-family:inherit; }
        .row input { min-width:130px; }
        .row textarea { flex:1;min-width:200px;min-height:36px;resize:vertical; }
        .btn { padding:8px 16px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s; }
        .btn:hover { border-color:var(--accent); }
        .btn-primary { background:var(--accent);color:white;border-color:var(--accent); }
        .btn-primary:hover { background:var(--accent-hover); }
        .btn-danger { color:var(--error); }
        .btn-group { display:flex;gap:8px;margin:16px 0;flex-wrap:wrap; }
        .empty-hint { text-align:center;padding:24px 16px;color:var(--text-secondary);font-size:13px;line-height:1.8; }
        .footer { text-align:center;padding:30px 20px;font-size:13px;color:var(--text-secondary);border-top:1px solid var(--border);margin-top:40px; }
        .footer a { color:var(--accent);text-decoration:none; }
        #aiCompleteOutput { white-space:pre-wrap;line-height:1.8; }
        @media(max-width:768px) {
            .header { padding:50px 15px 15px; } .title { font-size:24px; }
            .nav { gap:10px; } .nav-link { font-size:13px;padding:5px 10px; }
            .grid-2,.grid-3 { grid-template-columns:1fr; }
            .mobile-menu-btn { display:block; }
        }
        @media(max-width:480px) { .theme-switcher { top:10px;right:10px; } .theme-btn { padding:4px 8px;font-size:12px; } }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn active" onclick="setTheme('dark')">🌙</button>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('system')">💻</button>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    <div class="container">
        <div class="header">
            <div class="logo">🌍</div>
            <div class="title">世界观管理</div>
            <div class="subtitle">地图 · 时间线 · 势力 · 力量体系 · 规则引擎 · 设定百科（均本地保存）</div>
            <nav class="nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="main-editor.html" class="nav-link">编辑器</a>
                <a href="character-management.html" class="nav-link">角色</a>
                <a href="template-gallery.html" class="nav-link">模板</a>
                <a href="outline-editor.html" class="nav-link">大纲</a>
                <a href="knowledge-graph.html" class="nav-link">图谱</a>
                <a href="writing-analysis.html" class="nav-link">分析</a>
                <a href="platform-tools.html" class="nav-link">平台</a>
                <a href="world-builder.html" class="nav-link active">世界观</a>
                <a href="ai-suite.html" class="nav-link">AI</a>
                <a href="settings.html" class="nav-link">设置</a>
            </nav>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('map')">🗺️ 地图编辑器</button>
            <button class="tab-btn" onclick="switchTab('timeline')">⏳ 时间线</button>
            <button class="tab-btn" onclick="switchTab('factions')">⚔️ 势力系统</button>
            <button class="tab-btn" onclick="switchTab('power')">💪 力量体系</button>
            <button class="tab-btn" onclick="switchTab('rules')">📜 规则引擎</button>
            <button class="tab-btn" onclick="switchTab('encyclopedia')">📖 设定百科</button>
        </div>

        <!-- 地图编辑器 -->
        <div id="tab-map" class="tab-content active">
            <div class="terrain-picker" id="terrainPicker"></div>
            <div class="map-grid" id="mapGrid"></div>
            <div class="row">
                <button class="btn" onclick="clearMap()">🗑️ 清空地图</button>
                <button class="btn btn-primary" onclick="exportWorld()">📤 导出世界观</button>
                <button class="btn" onclick="aiComplete()">🤖 AI 补全建议</button>
            </div>
            <div id="aiCompleteOutput" class="card" style="display:none"></div>
            <div class="grid-2">
                <div class="card">
                    <div class="card-title">📍 地点列表</div>
                    <div class="row">
                        <input id="locName" placeholder="地点名">
                        <button class="btn btn-primary" onclick="addLocation()">➕ 添加</button>
                    </div>
                    <div id="locList"></div>
                </div>
                <div class="card">
                    <div class="card-title">📊 地图统计（实时）</div>
                    <div id="mapStats"></div>
                </div>
            </div>
        </div>

        <!-- 时间线 -->
        <div id="tab-timeline" class="tab-content">
            <div class="card">
                <div class="card-title">➕ 添加事件</div>
                <div class="row">
                    <input id="tlChapter" placeholder="章节/时间点" style="min-width:160px">
                    <textarea id="tlContent" placeholder="事件描述"></textarea>
                    <select id="tlStatus">
                        <option value="normal">普通</option>
                        <option value="conflict">冲突</option>
                        <option value="resolved">已解决</option>
                    </select>
                    <button class="btn btn-primary" onclick="addEvent()">添加</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">📅 故事时间线</div>
                <div class="timeline" id="tlList"></div>
            </div>
        </div>

        <!-- 势力系统 -->
        <div id="tab-factions" class="tab-content">
            <div class="card">
                <div class="card-title">➕ 新建势力</div>
                <div class="row">
                    <input id="facName" placeholder="势力名">
                    <input id="facDesc" placeholder="简介">
                    <select id="facPower">
                        <option value="1">★</option><option value="2">★★</option><option value="3">★★★</option><option value="4">★★★★</option><option value="5">★★★★★</option>
                    </select>
                    <button class="btn btn-primary" onclick="addFaction()">添加</button>
                </div>
            </div>
            <div class="faction-list" id="facList"></div>
        </div>

        <!-- 力量体系 -->
        <div id="tab-power" class="tab-content">
            <div class="card">
                <div class="card-title">➕ 添加等级</div>
                <div class="row">
                    <input id="lvName" placeholder="等级名，如 炼气期">
                    <input id="lvDesc" placeholder="描述">
                    <button class="btn btn-primary" onclick="addLevel()">添加</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">💪 修炼等级体系</div>
                <div id="lvList"></div>
            </div>
        </div>

        <!-- 规则引擎 -->
        <div id="tab-rules" class="tab-content">
            <div class="card">
                <div class="card-title">➕ 添加规则</div>
                <div class="row">
                    <input id="ruleText" placeholder="规则描述，如 主角不可同时出现在两地">
                    <select id="ruleStatus">
                        <option value="pass">通过</option><option value="warn">警告</option><option value="fail">违规</option>
                    </select>
                    <button class="btn btn-primary" onclick="addRule()">添加</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">📜 全局规则</div>
                <div id="ruleList"></div>
            </div>
        </div>

        <!-- 设定百科 -->
        <div id="tab-encyclopedia" class="tab-content">
            <div class="card">
                <div class="card-title">➕ 新建词条</div>
                <div class="row">
                    <input id="encTitle" placeholder="词条名">
                    <select id="encHeat">
                        <option value="高热度">🔥 高热度</option><option value="中热度">🟡 中热度</option><option value="低热度">🟢 低热度</option>
                    </select>
                </div>
                <div class="row">
                    <textarea id="encContent" placeholder="词条内容 / 设定说明"></textarea>
                    <button class="btn btn-primary" onclick="addEntry()">添加</button>
                </div>
            </div>
            <div class="encyclopedia-grid" id="encGrid"></div>
        </div>

        <div class="footer">
            <p>SAGE BOOK v1.5 | Created by DSArt-Design | 2026-06</p>
            <p style="margin-top:6px">Powered by Ollama · OpenAI · Claude · Qwen</p>
        </div>
    </div>

    <script>
        const LS_MAP='sagebook_wb_map', LS_LOC='sagebook_wb_loc', LS_TL='sagebook_wb_timeline',
              LS_FAC='sagebook_wb_factions', LS_LV='sagebook_wb_levels', LS_RULE='sagebook_wb_rules', LS_ENC='sagebook_wb_enc';
        const TERRAINS=['empty','water','forest','mountain','city','dungeon'];
        const TERRAIN_META={empty:{n:'空地',c:'var(--bg-primary)'},water:{n:'水域',c:'#3b82f6'},forest:{n:'森林',c:'#22c55e'},mountain:{n:'山地',c:'#8b8b8b'},city:{n:'城市',c:'var(--accent)'},dungeon:{n:'遗迹',c:'#f87171'}};
        let drawTerrain='city';

        function setTheme(t){const h=document.documentElement,b=document.querySelectorAll('.theme-btn');
        if(t==='system'){const d=window.matchMedia('(prefers-color-scheme:dark)').matches;h.setAttribute('data-theme',d?'dark':'light')}
        else h.setAttribute('data-theme',t);b.forEach(x=>x.classList.remove('active'));
        document.querySelector(`.theme-btn[onclick="setTheme('${t}')"]`).classList.add('active');
        localStorage.setItem('theme',t)}
        const st=localStorage.getItem('theme')||'dark';setTheme(st);
        function switchTab(id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active')}
        function toggleMobileMenu(){const n=document.querySelector('.nav');
        n.style.display=n.style.display==='flex'?'none':'flex';n.style.flexDirection='column';n.style.alignItems='center'}

        const get=(k,d)=>{ try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;} };
        const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

        // ===== 地图 =====
        function getMap(){ const m=get(LS_MAP,null); if(Array.isArray(m)&&m.length===60) return m; return new Array(60).fill('empty'); }
        function renderTerrainPicker(){
            document.getElementById('terrainPicker').innerHTML=TERRAINS.map(t=>`
                <div class="terrain-opt ${t===drawTerrain?'active':''}" onclick="setDraw('${t}')">
                    <span class="swatch" style="background:${TERRAIN_META[t].c}"></span>${TERRAIN_META[t].n}
                </div>`).join('');
        }
        function setDraw(t){ drawTerrain=t; renderTerrainPicker(); }
        function renderMap(){
            const map=getMap(); const g=document.getElementById('mapGrid'); g.innerHTML='';
            map.forEach((t,i)=>{ const c=document.createElement('div'); c.className='map-cell '+t; c.title=TERRAIN_META[t].n;
                c.onclick=()=>{ const m=getMap(); m[i]=drawTerrain; save(LS_MAP,m); renderMap(); renderMapStats(); };
                g.appendChild(c); });
        }
        function clearMap(){ save(LS_MAP,new Array(60).fill('empty')); renderMap(); renderMapStats(); }
        function renderMapStats(){
            const map=getMap(); const counts={}; TERRAINS.forEach(t=>counts[t]=0); map.forEach(t=>counts[t]++);
            document.getElementById('mapStats').innerHTML=Object.entries(TERRAIN_META).map(([k,m])=>
                `<div class="stat-row"><span class="stat-label">${m.n}</span><span class="stat-val">${counts[k]} 格</span></div>`).join('')+
                `<div class="stat-row"><span class="stat-label">已绘制</span><span class="stat-val">${60-counts.empty} / 60</span></div>`;
        }
        // 地点
        function renderLocations(){
            const locs=get(LS_LOC,[]); const el=document.getElementById('locList');
            if(!locs.length){ el.innerHTML='<div class="empty-hint">还没有地点。在上方添加，例如「王都·天启城」。</div>'; return; }
            el.innerHTML=locs.map((l,i)=>`<div class="stat-row"><span class="stat-label">${l.replace(/</g,'&lt;')}</span><button class="btn btn-danger" onclick="delLocation(${i})">删除</button></div>`).join('');
        }
        function addLocation(){ const v=document.getElementById('locName').value.trim(); if(!v){alert('请填写地点名');return;} const l=get(LS_LOC,[]); l.push(v); save(LS_LOC,l); document.getElementById('locName').value=''; renderLocations(); }
        function delLocation(i){ const l=get(LS_LOC,[]); l.splice(i,1); save(LS_LOC,l); renderLocations(); }

        // ===== 时间线 =====
        function renderTimeline(){
            const list=get(LS_TL,[]); const el=document.getElementById('tlList');
            if(!list.length){ el.innerHTML='<div class="empty-hint">还没有事件。在上方添加时间线节点。</div>'; return; }
            el.innerHTML=list.map((e,i)=>`
                <div class="tl-item ${e.status}">
                    <div class="tl-date">${e.chapter} ${e.status==='conflict'?'⚠️ 冲突':e.status==='resolved'?'✅ 已解决':''}</div>
                    <div class="tl-content">${e.content.replace(/</g,'&lt;')}</div>
                    <div class="btn-group" style="margin:6px 0 0"><button class="btn btn-danger" onclick="delEvent(${i})">🗑️ 删除</button></div>
                </div>`).join('');
        }
        function addEvent(){ const ch=document.getElementById('tlChapter').value.trim(); const c=document.getElementById('tlContent').value.trim(); const s=document.getElementById('tlStatus').value;
            if(!c){alert('请填写事件描述');return;} const l=get(LS_TL,[]); l.push({chapter:ch||'未注明',content:c,status:s}); save(LS_TL,l);
            document.getElementById('tlChapter').value=''; document.getElementById('tlContent').value=''; renderTimeline(); }
        function delEvent(i){ const l=get(LS_TL,[]); l.splice(i,1); save(LS_TL,l); renderTimeline(); }

        // ===== 势力 =====
        function renderFactions(){
            const list=get(LS_FAC,[]); const el=document.getElementById('facList');
            if(!list.length){ el.innerHTML='<div class="empty-hint">还没有势力。在上方新建，例如「天启王朝」。</div>'; return; }
            el.innerHTML=list.map((f,i)=>`
                <div class="faction-item">
                    <div class="faction-icon">⚔️</div>
                    <div class="faction-info"><div class="faction-name">${f.name.replace(/</g,'&lt;')}</div><div class="faction-desc">${f.desc.replace(/</g,'&lt;')}</div></div>
                    <span class="power-level">${'★'.repeat(f.power)}</span>
                    <button class="btn btn-danger" onclick="delFaction(${i})">删除</button>
                </div>`).join('');
        }
        function addFaction(){ const n=document.getElementById('facName').value.trim(); const d=document.getElementById('facDesc').value.trim(); const p=parseInt(document.getElementById('facPower').value)||1;
            if(!n){alert('请填写势力名');return;} const l=get(LS_FAC,[]); l.push({name:n,desc:d,power:p}); save(LS_FAC,l);
            document.getElementById('facName').value=''; document.getElementById('facDesc').value=''; renderFactions(); }
        function delFaction(i){ const l=get(LS_FAC,[]); l.splice(i,1); save(LS_FAC,l); renderFactions(); }

        // ===== 力量体系 =====
        function renderLevels(){
            const list=get(LS_LV,[]); const el=document.getElementById('lvList');
            if(!list.length){ el.innerHTML='<div class="empty-hint">还没有等级。在上方添加修炼/战力等级。</div>'; return; }
            el.innerHTML=list.map((lv,i)=>`<div class="stat-row"><span class="stat-label">${lv.name.replace(/</g,'&lt;')}</span><span class="stat-val">${lv.desc.replace(/</g,'&lt;')}</span><button class="btn btn-danger" onclick="delLevel(${i})">删除</button></div>`).join('');
        }
        function addLevel(){ const n=document.getElementById('lvName').value.trim(); const d=document.getElementById('lvDesc').value.trim();
            if(!n){alert('请填写等级名');return;} const l=get(LS_LV,[]); l.push({name:n,desc:d}); save(LS_LV,l);
            document.getElementById('lvName').value=''; document.getElementById('lvDesc').value=''; renderLevels(); }
        function delLevel(i){ const l=get(LS_LV,[]); l.splice(i,1); save(LS_LV,l); renderLevels(); }

        // ===== 规则引擎 =====
        function renderRules(){
            const list=get(LS_RULE,[]); const el=document.getElementById('ruleList');
            if(!list.length){ el.innerHTML='<div class="empty-hint">还没有规则。添加一致性约束，例如「已死角色不可出现对话」。</div>'; return; }
            el.innerHTML=list.map((r,i)=>`
                <div class="rule-item"><div class="rule-status ${r.status}"></div><div class="rule-text">${r.text.replace(/</g,'&lt;')}</div>
                <button class="btn btn-danger" onclick="delRule(${i})">删除</button></div>`).join('');
        }
        function addRule(){ const t=document.getElementById('ruleText').value.trim(); const s=document.getElementById('ruleStatus').value;
            if(!t){alert('请填写规则');return;} const l=get(LS_RULE,[]); l.push({text:t,status:s}); save(LS_RULE,l);
            document.getElementById('ruleText').value=''; renderRules(); }
        function delRule(i){ const l=get(LS_RULE,[]); l.splice(i,1); save(LS_RULE,l); renderRules(); }

        // ===== 设定百科 =====
        function renderEntries(){
            const list=get(LS_ENC,[]); const el=document.getElementById('encGrid');
            if(!list.length){ el.innerHTML='<div class="empty-hint">还没有词条。在上方新建设定百科条目。</div>'; return; }
            el.innerHTML=list.map((e,i)=>`
                <div class="encyclopedia-item">
                    <div class="encyclopedia-title">📍 ${e.title.replace(/</g,'&lt;')}</div>
                    <div class="encyclopedia-preview">${e.content.replace(/</g,'&lt;').slice(0,80)}</div>
                    <div class="encyclopedia-meta"><span>${e.heat}</span><button class="btn btn-danger" onclick="delEntry(${i})">删除</button></div>
                </div>`).join('');
        }
        function addEntry(){ const t=document.getElementById('encTitle').value.trim(); const c=document.getElementById('encContent').value.trim(); const h=document.getElementById('encHeat').value;
            if(!t){alert('请填写词条名');return;} const l=get(LS_ENC,[]); l.push({title:t,content:c,heat:h}); save(LS_ENC,l);
            document.getElementById('encTitle').value=''; document.getElementById('encContent').value=''; renderEntries(); }
        function delEntry(i){ const l=get(LS_ENC,[]); l.splice(i,1); save(LS_ENC,l); renderEntries(); }

        // ===== 导出 / AI（真实数据）=====
        function exportWorld(){
            const data={ map:getMap(), locations:get(LS_LOC,[]), timeline:get(LS_TL,[]), factions:get(LS_FAC,[]), levels:get(LS_LV,[]), rules:get(LS_RULE,[]), encyclopedia:get(LS_ENC,[]) };
            const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json;charset=utf-8'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
            a.download='世界观设定_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
        }
        const OLLAMA_BASE=localStorage.getItem('ollamaEndpoint')||'http://localhost:11434';
        async function aiComplete(){
            const model=localStorage.getItem('localModel');
            const out=document.getElementById('aiCompleteOutput'); out.style.display='block';
            if(!model){ out.innerHTML='<div style="color:var(--warning)">⚠️ 请先在设置中配置本地 AI 模型</div>'; return; }
            const facs=get(LS_FAC,[]), locs=get(LS_LOC,[]), rules=get(LS_RULE,[]), lvls=get(LS_LV,[]), enc=get(LS_ENC,[]);
            const prompt=`请基于以下世界观信息，提供补充与完善建议（5 条具体可操作）：\n\n势力(${facs.length}): ${facs.map(f=>f.name).join('、')||'无'}\n地点(${locs.length}): ${locs.join('、')||'无'}\n等级(${lvls.length}): ${lvls.map(l=>l.name).join('、')||'无'}\n规则(${rules.length}): ${rules.map(r=>r.text).join('；')||'无'}\n词条(${enc.length}): ${enc.map(e=>e.title).join('、')||'无'}\n\n请指出缺失的子系统（经济/宗教/历史/语言等）并给出补充建议。`;
            out.innerHTML='🔄 AI 正在分析世界观并生成补充建议...';
            try{
                const res=await fetch(OLLAMA_BASE+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,prompt,stream:false,options:{temperature:0.7}})});
                if(!res.ok) throw new Error('Ollama API error: '+res.status);
                const data=await res.json(); out.textContent=data.response;
            }catch(e){ out.innerHTML='<div style="color:var(--error)">⚠️ AI 调用失败：'+e.message+'</div>'; }
        }

        // 初始化
        renderTerrainPicker(); renderMap(); renderMapStats(); renderLocations();
        renderTimeline(); renderFactions(); renderLevels(); renderRules(); renderEntries();
    </script>
</body>
</html>
