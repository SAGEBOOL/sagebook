<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SAGE BOOK - 写作分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg-primary:#141413;--bg-secondary:#1c1c1a;--bg-tertiary:#2a2a28;--bg-hover:#333331;--bg-input:#1a1a19;--bg-card:#1c1c1a;--text-primary:#f0eee6;--text-secondary:#c8c6bd;--text-tertiary:#8b8a82;--text-muted:#5c5b55;--border:#3d3d3a;--accent:#d97757;--accent-hover:#e08a6e;--accent-light:#e08a6e;--accent-glow:rgba(217,119,87,0.3);--success:#5aab7a;--warning:#d4a853;--error:#e05555;
        }
        :root[data-theme="light"] {
            --bg-primary:#f7f5f0;--bg-secondary:#ffffff;--bg-tertiary:#efece6;--bg-hover:#e6e2da;--bg-input:#ffffff;--bg-card:#ffffff;--text-primary:#1c1b19;--text-secondary:#4a4843;--text-tertiary:#7a776f;--text-muted:#9a968c;--border:#d8d4cc;--accent:#c2410c;--accent-hover:#b85a3a;--accent-light:#d97757;--accent-glow:rgba(217,119,87,0.2);--success:#2f8f5b;--warning:#b07a1f;--error:#c0392b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px 20px; position: relative; }
        .logo { font-size: 36px; margin-bottom: 8px; }
        .title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
        .subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
        .nav { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; }
        .nav-link:hover { color: var(--text-primary); background: var(--bg-hover); }
        .nav-link.active { color: var(--accent); background: var(--bg-tertiary); border: 1px solid var(--border); }
        .theme-switcher { position: fixed; top: 15px; right: 20px; display: flex; gap: 4px; z-index: 100; }
        .theme-btn { padding: 6px 10px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .theme-btn:hover { border-color: var(--accent); }
        .theme-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .mobile-menu-btn { display: none; position: fixed; top: 15px; left: 15px; z-index: 100; padding: 8px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 18px; cursor: pointer; }
        .tabs { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
        .tab-btn { padding: 8px 20px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .tab-btn:hover { border-color: var(--accent); }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0; }
        .stat-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .analysis-section { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin: 16px 0; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin: 16px 0; padding: 0 10px; overflow-x: auto; }
        .bar-item { flex: 1; min-width: 22px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.3s; min-height: 4px; }
        .bar-label { font-size: 10px; color: var(--text-secondary); }
        .bar-value { font-size: 11px; font-weight: 600; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border-primary); background: var(--bg-tertiary); }
        .tag.hot { border-color: var(--error); color: var(--error); background: rgba(248,113,113,0.1); }
        .tag.warm { border-color: var(--warning); color: var(--warning); background: rgba(251,191,36,0.1); }
        .tag.cool { border-color: var(--success); color: var(--success); background: rgba(74,222,128,0.1); }
        .progress-bar { height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; margin: 16px 0; background: var(--bg-tertiary); border: 1px solid var(--border-primary); border-radius: 8px; padding: 12px; }
        .timeline-item::before { content: ''; position: absolute; left: -20px; top: 18px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg-primary); }
        .timeline-item.resolved::before { background: var(--success); }
        .timeline-date { font-size: 12px; color: var(--text-secondary); }
        .timeline-content { font-size: 14px; margin-top: 4px; }
        .btn { padding: 8px 16px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn:hover { border-color: var(--accent); }
        .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { color: var(--error); }
        .btn-group { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
        .empty-hint { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; line-height: 2; }
        .empty-hint a { color: var(--accent); }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
        .row input, .row select, .row textarea { background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); padding: 8px 10px; font-size: 13px; font-family: inherit; }
        .row input { min-width: 160px; }
        .row textarea { flex: 1; min-width: 240px; min-height: 38px; resize: vertical; }
        .hint-item { padding: 12px; border-left: 3px solid var(--accent); background: var(--bg-hover); border-radius: 0 8px 8px 0; margin: 8px 0; }
        .hint-item.good { border-left-color: var(--success); }
        .hint-item.warn { border-left-color: var(--warning); }
        .hint-item.bad { border-left-color: var(--error); }
        .hint-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .hint-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; }
        .footer { text-align: center; padding: 30px 20px; font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 40px; }
        .footer a { color: var(--accent); text-decoration: none; }
        #aiAnalyzeOutput { margin-top: 16px; white-space: pre-wrap; line-height: 1.8; }
        @media (max-width: 768px) {
            .header { padding: 50px 15px 15px; } .title { font-size: 24px; }
            .nav { gap: 10px; } .nav-link { font-size: 13px; padding: 5px 10px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .analysis-section { padding: 16px; } .section-title { font-size: 16px; }
            .mobile-menu-btn { display: block; }
        }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn active" onclick="setTheme('dark')">🌙</button>
        <button class="theme-btn" onclick="setTheme('light')">☀️</button>
        <button class="theme-btn" onclick="setTheme('system')">💻</button>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
    <div class="container">
        <div class="header">
            <a class="logo-link" href="index.html"><span class="logo-ico">📚</span><span class="logo-txt">SAGEBOOK</span></a>
            <div class="title">写作分析</div>
            <div class="subtitle">基于你真实文稿的节奏 · 伏笔 · 评分 · 风格分析</div>
            <nav class="nav">
                <a href="index.html" class="nav-link">🏠 首页</a>
                <a href="main-editor.html" class="nav-link">编辑器</a>
                <a href="character-management.html" class="nav-link">角色</a>
                <a href="template-gallery.html" class="nav-link">模板</a>
                <a href="outline-editor.html" class="nav-link">大纲</a>
                <a href="knowledge-graph.html" class="nav-link">图谱</a>
                <a href="writing-analysis.html" class="nav-link active">分析</a>
                <a href="platform-tools.html" class="nav-link">平台</a>
                <a href="world-builder.html" class="nav-link">世界观</a>
                <a href="ai-suite.html" class="nav-link">AI</a>
                <a href="settings.html" class="nav-link">设置</a>
            </nav>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rhythm')">🥁 节奏分析</button>
            <button class="tab-btn" onclick="switchTab('foreshadow')">🔮 伏笔追踪</button>
            <button class="tab-btn" onclick="switchTab('scoring')">⭐ 章节评分</button>
            <button class="tab-btn" onclick="switchTab('style')">🎨 风格洞察</button>
        </div>

        <!-- 节奏分析 -->
        <div id="tab-rhythm" class="tab-content active">
            <div class="stats-grid" id="rhythmStats"></div>
            <div class="analysis-section">
                <div class="section-title">📈 段落节奏曲线（基于真实文稿）</div>
                <div class="bar-chart" id="rhythmChart"></div>
                <div class="tag-list" id="rhythmTags"></div>
            </div>
            <div class="analysis-section">
                <div class="section-title">💡 节奏建议</div>
                <div id="rhythmHints"></div>
            </div>
        </div>

        <!-- 伏笔追踪 -->
        <div id="tab-foreshadow" class="tab-content">
            <div class="stats-grid" id="fsStats"></div>
            <div class="analysis-section">
                <div class="section-title">🔮 伏笔管理（点击回收 / 删除）</div>
                <div class="row">
                    <input id="fsChapter" placeholder="所在章节，如 第3章">
                    <input id="fsDesc" placeholder="伏笔内容描述">
                    <button class="btn btn-primary" onclick="addForeshadow()">➕ 添加伏笔</button>
                </div>
                <div id="fsList" style="margin-top:12px"></div>
            </div>
        </div>

        <!-- 章节评分 -->
        <div id="tab-scoring" class="tab-content">
            <div class="stats-grid" id="scoreStats"></div>
            <div class="analysis-section">
                <div class="section-title">📊 各维度评分（实时计算）</div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:16px 0" id="scoreDims"></div>
            </div>
            <div class="analysis-section">
                <div class="section-title">🏆 章节排名（按检测到章节）</div>
                <div id="scoreRank"></div>
            </div>
        </div>

        <!-- 风格洞察 -->
        <div id="tab-style" class="tab-content">
            <div class="stats-grid" id="styleStats"></div>
            <div class="analysis-section">
                <div class="section-title">📝 词频 TOP 20（真实文稿）</div>
                <div class="tag-list" id="wordFreq"></div>
            </div>
            <div class="analysis-section">
                <div class="section-title">📐 段落长度分布（真实文稿）</div>
                <div class="bar-chart" id="paraLengthChart"></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="runFullAnalysis()">🔍 全篇分析</button>
            <button class="btn" onclick="exportAnalysis()">📤 导出分析报告</button>
            <button class="btn" onclick="aiAnalyze()">🤖 AI 深度分析</button>
        </div>
        <div id="aiAnalyzeOutput" class="analysis-section" style="display:none"></div>
        </div>

    <script>
        const LS_CONTENT = 'sagebook_editor_content';
        const LS_FS = 'sagebook_foreshadows';

        function setTheme(t){const h=document.documentElement,b=document.querySelectorAll('.theme-btn');
        if(t==='system'){const d=window.matchMedia('(prefers-color-scheme:dark)').matches;h.setAttribute('data-theme',d?'dark':'light')}
        else h.setAttribute('data-theme',t);b.forEach(x=>x.classList.remove('active'));
        document.querySelector(`.theme-btn[onclick="setTheme('${t}')"]`).classList.add('active');
        localStorage.setItem('theme',t)}
        const st=localStorage.getItem('theme')||'dark';setTheme(st);
        function switchTab(id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
        document.getElementById('tab-'+id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        event.target.classList.add('active')}
        function toggleMobileMenu(){const n=document.querySelector('.nav');
        n.style.display=n.style.display==='flex'?'none':'flex';n.style.flexDirection='column';n.style.alignItems='center'}

        // ===== 真实文稿读取 =====
        // 主编辑器真实存储键为 sagebook_novel（JSON: {chapters:{fileId:{content:html}}}），聚合所有章节正文
        function getContent(){
            try {
                const raw = localStorage.getItem('sagebook_novel');
                if(raw){
                    const novel = JSON.parse(raw);
                    if(novel && novel.chapters){
                        const parts = [];
                        for(const k in novel.chapters){
                            const ch = novel.chapters[k];
                            if(ch && ch.content) parts.push(String(ch.content).replace(/<[^>]*>/g,''));
                        }
                        const merged = parts.join('\n\n').trim();
                        if(merged) return merged;
                    }
                }
            } catch(e){ /* 兼容损坏数据 */ }
            // 回退：旧版扁平存储
            return localStorage.getItem(LS_CONTENT) || '';
        }
        function getParagraphs(){
            const c = getContent().trim();
            if(!c) return [];
            return c.split(/\n\s*\n/).map(p=>p.trim()).filter(p=>p.length>0);
        }
        function getChapters(){
            const c = getContent();
            if(!c) return [];
            // 按「第X章/第X回」或空行分段
            const parts = c.split(/(?=第[一二三四五六七八九十百千0-9]+[章回卷节])/).map(s=>s.trim()).filter(s=>s.length>0);
            return parts.length>1 ? parts : getParagraphs();
        }
        function emptyState(el){ el.innerHTML = '<div class="empty-hint">暂无数据。<br>请先到 <a href="main-editor.html">主编辑器</a> 写入你的小说内容，本页所有分析都会基于真实文稿实时计算。</div>'; }

        // ===== 节奏分析（真实）=====
        function tensionOf(text){
            const t = text.trim();
            if(!t) return 0;
            let score = 40;
            const last = t.slice(-1);
            if(/[！!?？]/.test(last)) score += 35;
            const excl = (t.match(/[！!]/g)||[]).length;
            const q = (t.match(/[？?]/g)||[]).length;
            score += Math.min(20, excl*6 + q*5);
            const action = (t.match(/(冲|杀|战|逃|爆|轰|猛|突|扑|挡|挥|劈|吼|颤|裂)/g)||[]).length;
            score += Math.min(20, action*3);
            if(t.length > 260) score -= 12;        // 过长偏舒缓
            if(t.length < 60) score -= 8;
            return Math.max(5, Math.min(100, score));
        }
        function renderRhythm(){
            const statsEl = document.getElementById('rhythmStats');
            const chart = document.getElementById('rhythmChart');
            const tags = document.getElementById('rhythmTags');
            const hints = document.getElementById('rhythmHints');
            const paras = getParagraphs();
            if(!paras.length){ emptyState(statsEl); chart.innerHTML=''; tags.innerHTML=''; hints.innerHTML=''; return; }
            const scores = paras.map(tensionOf);
            const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
            const monotone = scores.filter((s,i)=> i>0 && Math.abs(s-scores[i-1])<12).length;
            const tense = scores.filter(s=>s>=66).length;
            const calm = scores.filter(s=>s<45).length;
            const ratio = calm>0 ? (tense/calm).toFixed(1) : (tense>0?'∞':'0');
            const grade = avg>=75?'A':avg>=65?'B+':avg>=55?'B':avg>=45?'C':'D';
            statsEl.innerHTML = `
                <div class="stat-card"><div class="stat-value">${avg}</div><div class="stat-label">平均节奏分</div></div>
                <div class="stat-card"><div class="stat-value">${monotone}</div><div class="stat-label">相邻单调段落</div></div>
                <div class="stat-card"><div class="stat-value">${ratio}</div><div class="stat-label">紧张/舒缓比</div></div>
                <div class="stat-card"><div class="stat-value">${grade}</div><div class="stat-label">节奏评级</div></div>`;
            const colors={紧张:'#f87171',中等:'#fbbf24',舒缓:'#4ade80'};
            chart.innerHTML = scores.map((s,i)=>{
                const lv = s>=66?'紧张':s<45?'舒缓':'中等';
                return `<div class="bar-item"><div class="bar-value">${s}</div><div class="bar" style="height:${s}%;background:${colors[lv]}"></div><div class="bar-label">${i+1}</div></div>`;
            }).join('');
            tags.innerHTML = `<span class="tag">紧张段落 ${tense}</span><span class="tag cool">舒缓段落 ${calm}</span><span class="tag warm">段落总数 ${paras.length}</span>`;
            // 建议
            let h='';
            if(monotone>=3) h+=`<div class="hint-item warn"><div class="hint-title">存在连续单调段落</div><div class="hint-body">有 ${monotone} 处相邻段落节奏接近，建议在其中插入转折、动作或悬念以提升张力。</div></div>`;
            if(calm>tense) h+=`<div class="hint-item warn"><div class="hint-title">整体偏舒缓</div><div class="hint-body">舒缓段落多于紧张段落，可考虑加快关键章节节奏。</div></div>`;
            if(!h) h=`<div class="hint-item good"><div class="hint-title">节奏分布健康</div><div class="hint-body">紧张与舒缓段落比例均衡，继续保持。</div></div>`;
            hints.innerHTML = h;
        }

        // ===== 伏笔追踪（真实 CRUD）=====
        function getFS(){ try { return JSON.parse(localStorage.getItem(LS_FS)||'[]'); } catch { return []; } }
        function saveFS(list){ localStorage.setItem(LS_FS, JSON.stringify(list)); renderFS(); }
        function addForeshadow(){
            const ch = document.getElementById('fsChapter').value.trim();
            const desc = document.getElementById('fsDesc').value.trim();
            if(!desc){ alert('请填写伏笔内容'); return; }
            const list = getFS();
            list.push({ id: Date.now(), chapter: ch||'未注明', desc, resolved:false });
            saveFS(list);
            document.getElementById('fsChapter').value='';
            document.getElementById('fsDesc').value='';
        }
        function toggleFS(id){
            const list = getFS().map(f=> f.id===id ? {...f, resolved:!f.resolved} : f);
            saveFS(list);
        }
        function delFS(id){ saveFS(getFS().filter(f=>f.id!==id)); }
        function renderFS(){
            const statsEl = document.getElementById('fsStats');
            const listEl = document.getElementById('fsList');
            const list = getFS();
            const total = list.length, resolved = list.filter(f=>f.resolved).length, pending = total-resolved;
            const rate = total? Math.round(resolved/total*100):0;
            statsEl.innerHTML = `
                <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">已埋伏笔</div></div>
                <div class="stat-card"><div class="stat-value">${resolved}</div><div class="stat-label">已回收</div></div>
                <div class="stat-card"><div class="stat-value">${pending}</div><div class="stat-label">待回收</div></div>
                <div class="stat-card"><div class="stat-value">${rate}%</div><div class="stat-label">回收率</div></div>`;
            if(!list.length){ listEl.innerHTML='<div class="empty-hint">还没有伏笔。在上方填写章节与描述，随时记录并标记回收。</div>'; return; }
            listEl.innerHTML = list.map(f=>`
                <div class="timeline-item ${f.resolved?'resolved':''}">
                    <div class="timeline-date">${f.chapter} ${f.resolved?'· ✅已回收':''}</div>
                    <div class="timeline-content">${f.desc.replace(/</g,'&lt;')}</div>
                    <div class="btn-group" style="margin:8px 0 0">
                        <button class="btn" onclick="toggleFS(${f.id})">${f.resolved?'↩️ 撤销回收':'✅ 标记回收'}</button>
                        <button class="btn btn-danger" onclick="delFS(${f.id})">🗑️ 删除</button>
                    </div>
                </div>`).join('');
        }

        // ===== 章节评分（真实）=====
        function scoreChapter(text){
            const t = text.trim();
            if(!t) return 0;
            let s = 60;
            const dialogue = (t.match(/[“"「『]/g)||[]).length;
            const dRatio = dialogue/Math.max(1, t.length/50);
            if(dRatio>0.4) s+=8; if(dRatio<0.05) s-=8;
            if(t.length>400 && t.length<2500) s+=10;
            if(t.length>3000) s-=10;
            if(/[？?！!]/.test(t.slice(-1))) s+=8;
            const vocab = new Set(t.replace(/[^一-龥]/g,'').split('')).size;
            if(vocab>40) s+=6;
            return Math.max(1, Math.min(100, Math.round(s)));
        }
        function renderScoring(){
            const statsEl=document.getElementById('scoreStats');
            const dimsEl=document.getElementById('scoreDims');
            const rankEl=document.getElementById('scoreRank');
            const chapters=getChapters();
            if(!chapters.length){ emptyState(statsEl); dimsEl.innerHTML=''; rankEl.innerHTML=''; return; }
            // 分维度（整篇统计）
            const all=getContent();
            const dialogue=(all.match(/[“"「『]/g)||[]).length;
            const totalChars=all.replace(/\s/g,'').length;
            const dRatio=Math.min(100, Math.round(dialogue/Math.max(1,totalChars/60)*100));
            const paraLens=getParagraphs().map(p=>p.length);
            const avgLen=paraLens.length?Math.round(paraLens.reduce((a,b)=>a+b,0)/paraLens.length):0;
            const variance=paraLens.length?Math.round(paraLens.reduce((a,b)=>a+Math.abs(b-avgLen),0)/paraLens.length):0;
            const plotScore=Math.min(100, 50+Math.min(40, (all.match(/[！!?？]/g)||[]).length*4));
            const charScore=Math.min(100, 50+Math.min(40, dialogue*3));
            const dims=[
                {n:'情节推进',v:plotScore,c:'var(--success)'},
                {n:'角色发展',v:charScore,c:'var(--accent)'},
                {n:'对话占比',v:dRatio,c:'var(--warning)'},
                {n:'段落均衡',v:Math.max(20, Math.round(100-Math.min(80,variance/30))),c:'var(--error)'}
            ];
            const avgScore=Math.round(dims.reduce((a,d)=>a+d.v,0)/dims.length);
            const chapterScores=chapters.map((c,i)=>({i, title: c.slice(0,18), score: scoreChapter(c) }));
            const best=chapterScores.reduce((a,b)=>b.score>a.score?b:a, chapterScores[0]);
            const worst=chapterScores.reduce((a,b)=>b.score<a.score?b:a, chapterScores[0]);
            statsEl.innerHTML=`
                <div class="stat-card"><div class="stat-value">${avgScore}</div><div class="stat-label">综合评分</div></div>
                <div class="stat-card"><div class="stat-value">${best.score}</div><div class="stat-label">最佳章节</div></div>
                <div class="stat-card"><div class="stat-value">${worst.score}</div><div class="stat-label">最低评分</div></div>
                <div class="stat-card"><div class="stat-value">${chapters.length}</div><div class="stat-label">章节数</div></div>`;
            dimsEl.innerHTML=dims.map(d=>`
                <div style="text-align:center">
                    <div style="font-size:36px;font-weight:800;color:${d.c}">${d.v}</div>
                    <div style="font-size:13px;color:var(--text-secondary)">${d.n}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${d.v}%;background:${d.c}"></div></div>
                </div>`).join('');
            const sorted=[...chapterScores].sort((a,b)=>b.score-a.score).slice(0,5);
            rankEl.innerHTML=sorted.map((c,idx)=>`
                <div class="hint-item ${c.score>=75?'good':c.score>=55?'':'bad'}">
                    <div class="hint-title">${'🥇🥈🥉'[idx]||'🏅'} 第${c.i+1}段/章 (${c.score})</div>
                    <div class="hint-body">${c.title.replace(/</g,'&lt;')}…</div>
                </div>`).join('');
        }

        // ===== 风格洞察（真实）=====
        function renderStyle(){
            const statsEl=document.getElementById('styleStats');
            const freqEl=document.getElementById('wordFreq');
            const plc=document.getElementById('paraLengthChart');
            const c=getContent();
            if(!c.trim()){ emptyState(statsEl); freqEl.innerHTML=''; plc.innerHTML=''; return; }
            const paras=getParagraphs();
            const dialogue=(c.match(/[“"「『]/g)||[]).length;
            const narr=c.length-dialogue*2;
            const dRatio=Math.round(dialogue/Math.max(1,(dialogue+narr/40)));
            const descRatio=Math.round(Math.min(100,(c.match(/(的|了|着|般|如|似|仿佛|像)/g)||[]).length/ Math.max(1,c.length/200)*20));
            statsEl.innerHTML=`
                <div class="stat-card"><div class="stat-value">${100-dRatio-descRatio>0?100-dRatio-descRatio:20}%</div><div class="stat-label">叙述占比</div></div>
                <div class="stat-card"><div class="stat-value">${dRatio}%</div><div class="stat-label">对话占比</div></div>
                <div class="stat-card"><div class="stat-value">${descRatio}%</div><div class="stat-label">描写占比</div></div>
                <div class="stat-card"><div class="stat-value">${paras.length}</div><div class="stat-label">段落总数</div></div>`;
            // 词频
            const stop='的了吗呢吧啊和在是与及把被让给和就也都还最这那一';
            const words=c.replace(/[^一-龥]/g,'').split('').filter(ch=>!stop.includes(ch));
            const freq={}; words.forEach(w=>freq[w]=(freq[w]||0)+1);
            const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,20);
            freqEl.innerHTML=top.map(([w,n],i)=>`<span class="tag ${i<6?'hot':i<13?'warm':'cool'}">${w} ${n}次</span>`).join('')||'<span class="tag">暂无足够文本</span>';
            // 段落长度分布
            const lens=paras.map(p=>p.length);
            const buckets={'1-3段(短)':0,'4-6段(中)':0,'7-10段(长)':0,'10+段(过长)':0};
            lens.forEach(l=>{ if(l<120)buckets['1-3段(短)']++; else if(l<300)buckets['4-6段(中)']++; else if(l<600)buckets['7-10段(长)']++; else buckets['10+段(过长)']++; });
            const max=Math.max(1,...Object.values(buckets));
            const cols={'1-3段(短)':'#4ade80','4-6段(中)':'#fbbf24','7-10段(长)':'#f87171','10+段(过长)':'#ef4444'};
            plc.innerHTML=Object.entries(buckets).map(([k,v])=>`
                <div class="bar-item"><div class="bar-value">${v}</div><div class="bar" style="height:${v/max*100}%;background:${cols[k]}"></div><div class="bar-label">${k}</div></div>`).join('');
        }

        // ===== 按钮功能（真实）=====
        function runFullAnalysis(){
            const c=getContent();
            if(!c.trim()){ alert('请先在主编辑器中写入内容后再进行分析'); return; }
            const paras=getParagraphs();
            const avgLen=Math.round(paras.reduce((a,p)=>a+p.length,0)/Math.max(1,paras.length));
            let summary=`📊 全文分析完成（基于真实文稿）\n\n总字数：${c.length}\n段落数：${paras.length}\n平均每段字数：${avgLen}\n章节数：${getChapters().length}\n伏笔记录：${getFS().length} 条\n\n节奏评分（逐段）：\n`;
            paras.slice(0,20).forEach((p,i)=>{ summary+=`第${i+1}段：${tensionOf(p)} 分\n`; });
            alert(summary);
        }
        function exportAnalysis(){
            const c=getContent();
            if(!c.trim()){ alert('请先在主编辑器中写入内容'); return; }
            const paras=getParagraphs();
            const avgLen=Math.round(paras.reduce((a,p)=>a+p.length,0)/Math.max(1,paras.length));
            const fs=getFS();
            const text=`SAGE BOOK 写作分析报告（真实数据）
========================================

📄 基本信息：
总字数：${c.length}
段落数：${paras.length}
平均每段字数：${avgLen}
章节数：${getChapters().length}

🔮 伏笔记录（${fs.length} 条）：
${fs.map(f=>`${f.resolved?'[已回收]':'[待回收]'} ${f.chapter}：${f.desc}`).join('\n')||'（无）'}

📈 节奏评分（逐段）：
${paras.map((p,i)=>`第${i+1}段：${tensionOf(p)} 分`).join('\n')}

生成时间：${new Date().toLocaleString()}
`;
            const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
            const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
            a.download='写作分析报告_'+new Date().toISOString().slice(0,10)+'.txt'; a.click();
        }
        // AI 深度分析 - 真实连接 Ollama
        const OLLAMA_BASE = localStorage.getItem('ollamaEndpoint') || 'http://localhost:11434';
        async function aiAnalyze(){
            const model = localStorage.getItem('localModel');
            if(!model){ alert('请先到设置页面选择 AI 模型'); return; }
            const c=getContent();
            if(!c.trim()){ alert('请先在主编辑器中写入内容'); return; }
            const out=document.getElementById('aiAnalyzeOutput');
            out.style.display='block';
            out.textContent='🔄 AI 正在分析文本...';
            try {
                const res=await fetch(OLLAMA_BASE+'/api/tags');
                const data=await res.json();
                if(!data.models.find(m=>m.name===model)){ out.textContent='❌ 所选模型不存在'; return; }
            } catch(e){ out.textContent='⚠️ 无法连接 Ollama，请确认已启动并配置跨域'; return; }
            const prompt=`请对以下小说文本进行深度写作分析：\n\n${c.substring(0,2000)}\n\n请从以下几个维度分析：\n1. 写作风格\n2. 节奏把控\n3. 人物刻画\n4. 情节张力\n5. 改进建议`;
            try {
                const res=await fetch(OLLAMA_BASE+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,prompt,stream:false,options:{temperature:0.7}})});
                if(!res.ok) throw new Error('Ollama API error: '+res.status);
                const data=await res.json();
                out.textContent=data.response;
            } catch(e){ out.textContent='⚠️ AI 分析失败：'+e.message; }
        }

        // 初始化渲染
        renderRhythm(); renderFS(); renderScoring(); renderStyle();
    </script>
