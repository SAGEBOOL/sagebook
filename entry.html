<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE BOOK - 智能创作平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #1e2a45;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --accent: #7c5cbf;
            --accent-hover: #9b7fd4;
            --border: #2a2a4a;
        }

        :root[data-theme="light"] {
            --bg-primary: #f5f0ff;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666680;
            --accent: #7c5cbf;
            --border: #e0d8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: var(--text-secondary);
        }

        .redirect {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        .redirect.error {
            display: block;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="loading-text">正在加载 SAGE BOOK...</div>
    </div>

    <div class="redirect" id="redirect">
        <p>检测到 SAGE BOOK 页面，正在跳转...</p>
        <a href="index.html">立即跳转</a>
    </div>

    <script>
        // 检测当前页面是否是 SAGEBOOK.html
        if (window.location.href.includes('SAGEBOOK.html')) {
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            document.querySelector('.loader').style.display = 'none';
            document.getElementById('redirect').style.display = 'block';
        }
    </script>
</body>
</html>
