<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE BOOK - 智能创作平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root[data-theme="dark"] {
            --bg-primary:#141413;--bg-secondary:#1c1c1a;--bg-tertiary:#2a2a28;--bg-hover:#333331;--bg-input:#1a1a19;--bg-card:#1c1c1a;--text-primary:#f0eee6;--text-secondary:#c8c6bd;--text-tertiary:#8b8a82;--text-muted:#5c5b55;--border:#3d3d3a;--accent:#d97757;--accent-hover:#e08a6e;--accent-light:#e08a6e;--accent-glow:rgba(217,119,87,0.3);--success:#5aab7a;--warning:#d4a853;--error:#e05555;
        }

        :root[data-theme="light"] {
            --bg-primary:#f7f5f0;--bg-secondary:#ffffff;--bg-tertiary:#efece6;--bg-hover:#e6e2da;--bg-input:#ffffff;--bg-card:#ffffff;--text-primary:#1c1b19;--text-secondary:#4a4843;--text-tertiary:#7a776f;--text-muted:#9a968c;--border:#d8d4cc;--accent:#c2410c;--accent-hover:#b85a3a;--accent-light:#d97757;--accent-glow:rgba(217,119,87,0.2);--success:#2f8f5b;--warning:#b07a1f;--error:#c0392b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: var(--text-secondary);
        }

        .redirect {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        .redirect.error {
            display: block;
            color: #ff6b6b;
        }
    </style>
    <link rel="stylesheet" href="design-system.css">
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div class="loading-text">正在加载 SAGE BOOK...</div>
    </div>

    <div class="redirect" id="redirect">
        <p>检测到 SAGE BOOK 页面，正在跳转...</p>
        <a href="index.html">立即跳转</a>
    </div>

    <script>
        // 检测当前页面是否是 SAGEBOOK.html
        if (window.location.href.includes('SAGEBOOK.html')) {
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            document.querySelector('.loader').style.display = 'none';
            document.getElementById('redirect').style.display = 'block';
        }
    </script>
</body>
</html>
